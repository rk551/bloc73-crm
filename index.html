function graefWeekStartFromUI(){
  const el=document.getElementById('graefWeekStart') || document.getElementById('weekExportStart');
  return mondayOfDateString(el?.value || currentWeekStart());
}
function graefRowsForWeekStart(startIso, includeArchived=true){
  const start=mondayOfDateString(startIso||currentWeekStart());
  return (db.graef||[])
    .filter(g=>dateInWeekRange(g.informedAt,start) && (includeArchived || !g.archivedAt))
    .sort((a,b)=>(a.informedAt||'').localeCompare(b.informedAt||'') || (a.company||'').localeCompare(b.company||''));
}
function activeGraefRows(){
  autoArchiveGraefWeeks(false);
  const start=currentWeekStart();
  return graefRowsForWeekStart(start,false);
}
function autoArchiveGraefWeeks(doPersist=true){
  const start=currentWeekStart();
  let changed=false;
  (db.graef||[]).forEach(g=>{
    if(g.informedAt && g.informedAt < start && !g.archivedAt){
      g.archivedAt=new Date().toISOString();
      g.archiveReason='Automatisch nach Wochenende/Sonntag aus aktiver GRAEF-Liste entfernt';
      changed=true;
    }
  });
  if(changed && doPersist) persist();
}

  const data=rows.map(r=>({
    Firma:r.company,

    Datum:formatDate(r.informedAt),
    Status:r.archivedAt?'archiviert':'aktiv',

    Website:r.website||'',
    Besprochen:r.discussion||'',
    Notiz:r.notes||''
  }));
  downloadPdfReport(`GRAEF informiert · ${week}`,`Wochenbericht · ${formatDate(start)} bis ${formatDate(addDaysToIso(start,6))} · PDF-Export aus BLOC73 CRM`,data,`GRAEF_Information_${week}_${start}.pdf`);

function closeGraefWeek(){
  const start=graefWeekStartFromUI();
  const week=weekKeyFromStart(start);
  const rows=graefRowsForWeekStart(start,true).filter(r=>!r.archivedAt);
  if(!rows.length){alert('Keine aktiven GRAEF-Einträge für '+week+' vorhanden.');return;}
  if(!confirm(`GRAEF-Woche ${week} als PDF herunterladen und danach aus der aktiven Liste entfernen?\n\nDie Daten bleiben im Backup/Archiv erhalten.`))return;
  exportGraefWeekPDF();
  const now=new Date().toISOString();
  rows.forEach(r=>{r.archivedAt=now;r.archiveReason='Wochenabschluss per PDF';});
  persist();
  renderNav();
  renderContent();
  alert(`GRAEF-Woche ${week} abgeschlossen. Die Einträge sind aus der aktiven GRAEF-Liste entfernt.`);

/* === v18: Professionelles GRAEF-Wochen-PDF Layout === */
function pdfCmdText(x,y,text,size=9,font='F1',color=[0.12,0.12,0.12]){
  return `BT /${font} ${size} Tf ${color[0]} ${color[1]} ${color[2]} rg ${x} ${y} Td ${pdfHex(text)} Tj ET`;
}
function pdfRect(x,y,w,h,fill=[1,1,1],stroke=null){
  let s=`q ${fill[0]} ${fill[1]} ${fill[2]} rg ${x} ${y} ${w} ${h} re f Q`;
  if(stroke) s += `\nq ${stroke[0]} ${stroke[1]} ${stroke[2]} RG ${x} ${y} ${w} ${h} re S Q`;
  return s;
}
function pdfLine(x1,y1,x2,y2,color=[0.82,0.82,0.82],width=0.6){
  return `q ${color[0]} ${color[1]} ${color[2]} RG ${width} w ${x1} ${y1} m ${x2} ${y2} l S Q`;
}
function cleanPdfValue(v,fallback=''){
  const s=String(v??'').replace(/\s+/g,' ').trim();
  return s || fallback;
}
function chunkLines(text,max=86){
  text=cleanPdfValue(text);
  if(!text)return [];
  const raw=text.split(/\n+/).flatMap(part=>wrapText(part,max));
  return raw.filter(Boolean);
}
function buildSimplePdf(pages,filename){
  const pageW=595,pageH=842;
  const objects=[];
  function obj(s){objects.push(s);return objects.length;}
  const fRegular=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
  const fBold=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
  objects.push('');
  const pagesId=3;
  const pageIds=[];
  for(const ops of pages){
    const content=ops.join('\n');
    const contentId=obj(`<< /Length ${content.length} >>\nstream\n${content}\nendstream`);
    const pageId=obj(`<< /Type /Page /Parent ${pagesId} 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /Font << /F1 ${fRegular} 0 R /F2 ${fBold} 0 R >> >> /Contents ${contentId} 0 R >>`);
    pageIds.push(pageId);
  }
  objects[pagesId-1]=`<< /Type /Pages /Kids [${pageIds.map(id=>id+' 0 R').join(' ')}] /Count ${pageIds.length} >>`;
  const catalogId=obj(`<< /Type /Catalog /Pages ${pagesId} 0 R >>`);
  let pdf='%PDF-1.4\n';
  const offsets=[0];
  objects.forEach((o,i)=>{offsets.push(pdf.length);pdf+=`${i+1} 0 obj\n${o}\nendobj\n`;});
  const xref=pdf.length;
  pdf+=`xref\n0 ${objects.length+1}\n0000000000 65535 f \n`+offsets.slice(1).map(n=>String(n).padStart(10,'0')+' 00000 n ').join('\n')+`\ntrailer << /Size ${objects.length+1} /Root ${catalogId} 0 R >>\nstartxref\n${xref}\n%%EOF`;
  download(pdf,filename,'application/pdf');
}
function downloadGraefProfessionalPDF(rows,start,week,filename){
  const pageW=595,pageH=842, margin=36;
  let pages=[], ops=[], pageNo=0, y=0;
  const range=`${formatDate(start)} bis ${formatDate(addDaysToIso(start,6))}`;
  const created=new Date().toLocaleDateString('de-DE');

function v20SameBusiness(a,b){

  return r.graefOnly===true || r.isGraef===true || r.source==='GRAEF informiert' || text.includes('graef') || text.includes('gräf') || text.includes('graef informiert') || String(r.graefInfo||'').toLowerCase()==='ja';
}
function v20HasNonGraefTwin(r,start){
  const pools=[...(db.tours||[]),...(db.visited||[]),...(db.customers||[]),...(db.leads||[])];

function graefReportRowsForWeekStart(startIso, includeArchived=true){
  const start=mondayOfDateString(startIso||currentWeekStart());

    const row=v20NormalizeGraefRow(r,start);

    if(!includeArchived && row.archivedAt) return;

    // Einträge aus dem Modul „GRAEF informiert“ gelten nur dann als Report-Eintrag,
    // wenn sie markiert sind oder kein nicht-GRAEF-Zwilling in Kunden/Touren existiert.
    if(v20HasGraefMarker(r) || !v20HasNonGraefTwin(r,start)) add({...r,graefOnly:true,source:r.source||'GRAEF informiert'});
  });
  (db.tours||[]).forEach(r=>{ if(v20DateInSelectedWeek(r.tourDate||r.visitedAt,start) && v20HasGraefMarker(r)) add({...r,informedAt:(r.visitedAt||r.tourDate),source:'GRAEF informiert'}); });

/* === v48: TomTom-Verknüpfung für Tagestouren ===
   Ziel: funktionierende Tourübergabe ohne die stabile v47-Tourlogik anzufassen.
   - Einzelkunde: Adresse kopieren + Plan.TomTom öffnen
   - Tag/Woche: GPX-Route erzeugen; fehlende Koordinaten werden bei Bedarf per Nominatim geokodiert
   - Falls Koordinaten fehlen und nicht gefunden werden, wird der Kunde im Hinweis genannt
*/
(function(){
  'use strict';
  const TT48_PLAN_URL='https://plan.tomtom.com/';
  function h48(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function q48(v){return JSON.stringify(String(v??'')).replace(/"/g,'&quot;');}
  function activeRows48(){
    return (db.tours||[]).filter(t=>!t.closed&&!t.hidden&&!['Besucht','Lead erstellt','Wiedervorlage','Kein Interesse','Nicht vorhanden','Nicht relevant'].includes(t.status||''));
  }
  function visibleRows48(){
    const q=(document.getElementById('listQ')?.value||'').toLowerCase().trim();
    const rows=activeRows48();
    if(!q)return rows;
    return rows.filter(r=>String(JSON.stringify(r)).toLowerCase().includes(q));
  }
  function toursForDate48(date){return activeRows48().filter(t=>String(t.tourDate||'')===String(date)).sort((a,b)=>(Number(a.order||0)-Number(b.order||0)) || (a.company||'').localeCompare(b.company||''));}
  function toursForWeek48(start){
    const s=mondayOfDateString(start||currentWeekStart());
    const days=new Set([0,1,2,3,4].map(i=>addDaysToIso(s,i)));
    return activeRows48().filter(t=>days.has(String(t.tourDate||''))).sort((a,b)=>(a.tourDate||'').localeCompare(b.tourDate||'') || (Number(a.order||0)-Number(b.order||0)) || (a.company||'').localeCompare(b.company||''));
  }
  function firstTourDate48(){return activeRows48().map(t=>t.tourDate).filter(Boolean).sort()[0] || today();}
  function mondayForPrompt48(){return mondayOfDateString(firstTourDate48()||today());}
  function getTour48(id){return (db.tours||[]).find(t=>String(t.id)===String(id));}
  function addr48(t){return [t.company,t.address].filter(Boolean).join(', ');}
  function sanitizeFile48(v){return String(v||'tour').replace(/[^a-zA-Z0-9äöüÄÖÜß_-]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');}
  async function copyText48(text){
    try{await navigator.clipboard.writeText(text);return true;}catch(e){
      const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.focus();ta.select();let ok=false;try{ok=document.execCommand('copy');}catch(_){ok=false;}document.body.removeChild(ta);return ok;
    }
  }
  window.openTomTomPlan48=function(){window.open(TT48_PLAN_URL,'_blank');};
  window.openTourTomTomSingle48=async function(id){
    const t=getTour48(id); if(!t){alert('Tour-Eintrag nicht gefunden.');return;}
    const text=addr48(t);
    await copyText48(text);
    window.open(TT48_PLAN_URL,'_blank');
    alert('Adresse wurde kopiert.\n\nJetzt in Plan.TomTom einfügen und als Ziel/Stop übernehmen:\n\n'+text);
  };
  async function geocodeTour48(t){
    if(t.lat&&t.lon)return {lat:Number(t.lat),lon:Number(t.lon)};
    if(t.latitude&&t.longitude)return {lat:Number(t.latitude),lon:Number(t.longitude)};
    const query=addr48(t);
    if(!query)return null;
    try{
      const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=de&q='+encodeURIComponent(query);
      const res=await fetch(url,{headers:{'Accept':'application/json'}});
      if(!res.ok)return null;
      const data=await res.json();
      if(data&&data[0]&&data[0].lat&&data[0].lon){
        t.lat=Number(data[0].lat); t.lon=Number(data[0].lon); t.updatedAt=new Date().toISOString();
        return {lat:t.lat,lon:t.lon};
      }
    }catch(e){return null;}
    return null;
  }
  function gpxEscape48(v){return String(v??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  async function buildGpx48(rows,name){
    const ok=[], missing=[];
    for(const t of rows){
      const c=await geocodeTour48(t);
      if(c) ok.push({t,lat:c.lat,lon:c.lon}); else missing.push(t.company||t.address||'ohne Name');
      await new Promise(r=>setTimeout(r,180));
    }
    if(!ok.length){alert('Keine Route erzeugt: Es wurden keine Koordinaten gefunden. Tipp: Touren aus der Umkreissuche enthalten Koordinaten; manuelle Einträge brauchen eine gut erkennbare Adresse.');return false;}
    const now=new Date().toISOString();
    const rtepts=ok.map((x,i)=>`    <rtept lat="${x.lat}" lon="${x.lon}">\n      <name>${gpxEscape48(String(i+1).padStart(2,'0')+' · '+(x.t.company||'Betrieb'))}</name>\n      <desc>${gpxEscape48([x.t.address,x.t.phone,x.t.target].filter(Boolean).join(' · '))}</desc>\n    </rtept>`).join('\n');
    const gpx=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="BLOC73 CRM v49" xmlns="http://www.topografix.com/GPX/1/1">\n  <metadata>\n    <name>${gpxEscape48(name)}</name>\n    <time>${now}</time>\n  </metadata>\n  <rte>\n    <name>${gpxEscape48(name)}</name>\n${rtepts}\n  </rte>\n</gpx>\n`;
    download(gpx, sanitizeFile48(name)+'.gpx','application/gpx+xml;charset=utf-8');
    persist();
    if(missing.length) alert('GPX wurde erstellt.\n\nNicht übernommen, weil keine Koordinaten gefunden wurden:\n- '+missing.join('\n- '));
    else alert('GPX wurde erstellt. In TomTom/Plan.TomTom als Route importieren bzw. öffnen.');
    return true;
  }
  window.exportTomTomDay48=async function(){
    const def=firstTourDate48();
    const d=prompt('Welchen Tourtag als TomTom-GPX exportieren?\nFormat: JJJJ-MM-TT',def);
    if(!d)return;
    const rows=toursForDate48(d);
    if(!rows.length){alert('Keine aktiven Tour-Einträge für '+formatDate(d)+'.');return;}
    await buildGpx48(rows,'BLOC73_TomTom_Tagestour_'+d);
  };
  window.exportTomTomWeek48=async function(){
    const def=mondayForPrompt48();
    const start=mondayOfDateString(prompt('Welche Woche als TomTom-GPX exportieren?\nBitte Montag der Woche eingeben (JJJJ-MM-TT).',def)||'');
    if(!start)return;
    const rows=toursForWeek48(start);
    if(!rows.length){alert('Keine aktiven Tour-Einträge für die Woche ab '+formatDate(start)+'.');return;}
    await buildGpx48(rows,'BLOC73_TomTom_Wochentour_'+start+'_bis_'+addDaysToIso(start,4));
  };
  window.copyTomTomStops48=async function(){
    const d=prompt('Stops von welchem Tourtag kopieren?\nFormat: JJJJ-MM-TT',firstTourDate48());
    if(!d)return;
    const rows=toursForDate48(d);
    if(!rows.length){alert('Keine aktiven Tour-Einträge für '+formatDate(d)+'.');return;}
    const text=rows.map((t,i)=>`${i+1}. ${addr48(t)}${t.phone?' · Tel. '+t.phone:''}`).join('\n');
    await copyText48(text);
    alert('TomTom-Stops für '+formatDate(d)+' wurden kopiert.\n\nPlan.TomTom öffnen und Stops einfügen/übernehmen.');
  };

  const prevRow48=window.rowHTML || (typeof rowHTML==='function'?rowHTML:null);
  window.rowHTML=function(m,r){
    if(m==='tours'){
      const best=(typeof window.findExistingCustomerV46==='function') ? window.findExistingCustomerV46(r) : null;
      const id=q48(r.id||'');
      const route=q48(r.address||r.company||'');
      return `<tr><td>${formatDate(r.tourDate)}</td><td>${h48(r.order||'')}</td><td><b>${h48(r.company||'')}</b><br><span class="muted small">${h48(r.address||'')}</span><br>${best?pill('Bestandskunde'):pill('Neukunde')}</td><td>${pill(r.status||'Geplant')}</td><td>${pill(r.graefInfo||'Nein')}</td><td>${h48((r.discussion||'').slice(0,120))}</td><td><div class="row-actions"><button class="btn ok" onclick="markTourVisited(${id})">Besucht</button><button class="btn primary" onclick="markTourLead(${id})">Lead</button><button class="btn" onclick="markTourFollowUp(${id})">Wiedervorlage</button><button class="btn warn" onclick="markTourGraef(${id})">GRAEF</button><button class="btn danger" onclick="markTourNoInterest(${id})">Kein Interesse</button><button class="btn danger" onclick="markTourGone(${id})">Nicht vorhanden</button><button class="btn" onclick="openMapsFor(${route})">Route</button><button class="btn primary" onclick="openTourTomTomSingle48(${id})">TomTom</button><button class="btn" onclick="openModal('tours',${id})">Bearbeiten</button><button class="btn ghost" onclick="deleteTourRecord(${id})">Abschluss</button><button class="btn danger" style="font-weight:900;border-color:#9b2b2b" onclick="deleteTourOnly47(${id})">Tour löschen</button></div></td></tr>`;
    }
    return prevRow48?prevRow48(m,r):'';
  };
  try{rowHTML=window.rowHTML;}catch(e){}

  const prevList48=window.listHTML || (typeof listHTML==='function'?listHTML:null);
  window.listHTML=function(m){
    if(m==='tours'){
      const rows=visibleRows48();
      const closed=(db.tours||[]).length-activeRows48().length;
      return `<div class="panel"><div class="panel-head"><div><h3>Tagestouren · aktive Planung</h3><div class="muted">v48: TomTom-Verknüpfung. Einzelziel öffnen oder Tag/Woche als GPX exportieren.</div></div><div class="toolbar"><input class="input" id="listQ" placeholder="Aktive Tour suchen …" oninput="renderContent()"><button class="btn primary" onclick="openModal('tours')">+ Tour-Eintrag</button><button class="btn" onclick="setActive('visited')">Besuchshistorie</button><button class="btn" onclick="setActive('leads')">Leads</button><button class="btn" onclick="exportCSV('tours')">CSV alle Tourdaten</button></div></div><div class="panel-body"><div class="notice"><b>TomTom:</b> Pro Zeile öffnet <b>TomTom</b> Plan.TomTom und kopiert die Adresse. Für eine komplette Route nutzt du <b>TomTom Tag GPX</b> oder <b>TomTom Woche GPX</b>. Fehlende Koordinaten werden vor dem Export automatisch aus der Adresse gesucht.</div><div class="actions"><button class="btn primary" onclick="exportTomTomDay48()">TomTom Tag GPX</button><button class="btn" onclick="exportTomTomWeek48()">TomTom Woche GPX</button><button class="btn" onclick="copyTomTomStops48()">Stops kopieren</button><button class="btn" onclick="openTomTomPlan48()">Plan.TomTom öffnen</button></div><div class="hint" style="margin-top:10px">Ausgeblendete abgeschlossene Tour-Einträge: ${closed}. GPX enthält nur aktive, sichtbare Tourdaten nach Datum/Woche.</div></div><div class="table-wrap"><table><thead>${tableHead('tours')}</thead><tbody id="tableBody">${tableRows('tours',rows)}</tbody></table></div></div>`;

      }).slice(0,3).join(', ');
    } else {
      var mAddr = joined.match(/([A-ZÄÖÜa-zäöüß .-]+(?:straße|str\.|weg|platz|allee|ring|gasse|damm|ufer)[^\n,]*\s+\d+[a-z]?(?:\s*,\s*)?\n?\s*\d{5}\s+[A-ZÄÖÜa-zäöüß .-]+)/i);
      if(mAddr) address = mAddr[1].replace(/\n/g,', ').trim();
    }

    var notes = 'Kontaktdaten aus Website/Impressum übernommen.';
    if(url) notes += ' Quelle: '+url;

    return {
      company: company || '',
      address: address || '',
      phone: phone || '',
      email: email || '',
      website: website || '',
      notes: notes
    };
  }

        '<button class="btn ok" type="button" onclick="saveWebsiteAsCustomer77()">Als Kunde speichern</button>'+

      '</div>';

  window.openWebsiteImport77 = function(){
    var d = ensureWebsiteDialog77();
    var td = document.getElementById('webTourDate77');
    if(td) td.value = selectedTourDate77();
    d.showModal();
  };

  window.closeWebsiteImport77 = function(){
    var d = document.getElementById('websiteImport77');
    if(d) d.close();
  };

  window.clearWebsiteImport77 = function(){
    ['webUrl77','webPaste77','webCompany77','webPhone77','webEmail77','webWebsite77','webAddress77','webNotes77'].forEach(function(id){
      var el = document.getElementById(id);
      if(el) el.value = '';
    });
  };

  window.openWebsite77 = function(){
    var url = normalizeUrl77((document.getElementById('webUrl77')||{}).value || '');
    if(!url) return alert('Bitte Website-Link einfügen.');
    window.open(url,'_blank');
  };

  window.openImpressum77 = function(){
    var base = rootUrl77((document.getElementById('webUrl77')||{}).value || '');
    if(!base) return alert('Bitte Website-Link einfügen.');
    window.open(base.replace(/\/$/,'') + '/impressum','_blank');
    setTimeout(function(){ window.open(base.replace(/\/$/,'') + '/kontakt','_blank'); }, 200);
  };

  function fillWebsite77(data){
    if(document.getElementById('webCompany77')) document.getElementById('webCompany77').value = data.company || '';
    if(document.getElementById('webAddress77')) document.getElementById('webAddress77').value = data.address || '';
    if(document.getElementById('webPhone77')) document.getElementById('webPhone77').value = data.phone || '';
    if(document.getElementById('webEmail77')) document.getElementById('webEmail77').value = data.email || '';
    if(document.getElementById('webWebsite77')) document.getElementById('webWebsite77').value = data.website || '';
    if(document.getElementById('webNotes77')) document.getElementById('webNotes77').value = data.notes || '';
  }

  window.parseWebsitePaste77 = function(){
    var txt = (document.getElementById('webPaste77')||{}).value || '';
    var url = (document.getElementById('webUrl77')||{}).value || '';
    var data = parseWebsiteContact77(txt, url);
    fillWebsite77(data);
  };

  window.tryWebsiteFetch77 = async function(){
    var url = normalizeUrl77((document.getElementById('webUrl77')||{}).value || '');
    if(!url) return alert('Bitte Website-Link einfügen.');
    try{
      var res = await fetch(url, {mode:'cors'});
      if(!res.ok) throw new Error(res.status + ' ' + res.statusText);
      var txt = await res.text();
      var data = parseWebsiteContact77(txt, url);
      fillWebsite77(data);
      if(!data.phone && !data.email && !data.address){
        alert('Website wurde gelesen, aber Kontaktdaten sind nicht eindeutig. Bitte Impressum/Kontakt öffnen und Text einfügen.');
      }
    }catch(e){
      alert('Direktes Auslesen wurde vom Browser oder von der Website blockiert. Das ist normal. Bitte Website/Impressum öffnen, Kontaktdaten kopieren und im Textfeld einfügen.');
      window.open(url,'_blank');
    }
  };

  function readWebsite77(){
    var company = String((document.getElementById('webCompany77')||{}).value || '').trim();
    var address = String((document.getElementById('webAddress77')||{}).value || '').trim();
    if(!company) throw new Error('Bitte Firma eintragen.');
    if(!address) throw new Error('Bitte Adresse eintragen.');

    return {
      company: company,
      address: address,
      phone: String((document.getElementById('webPhone77')||{}).value || '').trim(),
      email: String((document.getElementById('webEmail77')||{}).value || '').trim(),
      website: String((document.getElementById('webWebsite77')||{}).value || '').trim(),
      target: String((document.getElementById('webTarget77')||{}).value || 'Händler').trim(),
      tourDate: String((document.getElementById('webTourDate77')||{}).value || selectedTourDate77()).trim(),
      notes: String((document.getElementById('webNotes77')||{}).value || 'Kontaktdaten aus Website übernommen.').trim()
    };
  }

  function nextOrder77(date){
    var arr = (db.tours || []).filter(function(t){return t.tourDate === date;});
    var max = 0;
    arr.forEach(function(t){
      var n = Number(t.order || 0);
      if(n > max) max = n;
    });
    return max + 1;
  }

  function duplicate77(data){
    var key = String(data.company + ' ' + data.address).toLowerCase().replace(/[^a-z0-9äöüß]+/g,' ').trim();
    return (db.customers || []).concat(db.tours || []).some(function(r){
      var rk = String((r.company || '') + ' ' + (r.address || '')).toLowerCase().replace(/[^a-z0-9äöüß]+/g,' ').trim();
      return rk && rk === key;
    });
  }

  window.saveWebsiteAsCustomer77 = function(){
    try{
      var d = readWebsite77();
      if(duplicate77(d) && !confirm('Dieser Kontakt scheint bereits vorhanden zu sein. Trotzdem speichern?')) return;
      db.customers = db.customers || [];
      db.customers.unshift({
        id: uid(),
        company: d.company,
        target: d.target,
        status: 'Interessent',
        address: d.address,
        phone: d.phone,
        email: d.email,
        website: d.website,
        lastVisit: '',
        graefInfo: 'Nein',
        nextDate: '',
        notes: d.notes,
        discussion: '',
        createdAt: now77(),
        updatedAt: now77()
      });
      persist();
      closeWebsiteImport77();
      if(typeof renderNav === 'function') renderNav();
      if(typeof setActive === 'function') setActive('customers');
    }catch(e){ alert(e.message || e); }
  };

  window.saveWebsiteToTour77 = function(){
    try{
      var d = readWebsite77();
      if(duplicate77(d) && !confirm('Dieser Kontakt scheint bereits vorhanden zu sein. Trotzdem in die Tour übernehmen?')) return;
      db.tours = db.tours || [];
      db.tours.push({
        id: uid(),
        tourDate: d.tourDate,
        weekStart: (typeof mondayOfDateString === 'function') ? mondayOfDateString(d.tourDate) : '',
        weekKey: (typeof mondayOfDateString === 'function' && typeof weekKeyFromStart === 'function') ? weekKeyFromStart(mondayOfDateString(d.tourDate)) : '',
        order: nextOrder77(d.tourDate),
        company: d.company,
        target: d.target,
        address: d.address,
        phone: d.phone,
        website: d.website,
        status: 'Geplant',
        graefInfo: 'Nein',
        visitedAt: '',
        notes: d.notes,
        discussion: '',
        source: 'Website-Kontaktimport',
        createdAt: now77(),
        updatedAt: now77()
      });
      persist();
      closeWebsiteImport77();
      if(typeof renderNav === 'function') renderNav();
      if(typeof setActive === 'function') setActive('tours');
    }catch(e){ alert(e.message || e); }
  };

  function addWebsiteButtons77(){
    var help = document.getElementById('dealerHelp75');
    if(help && !document.getElementById('websiteImportBtn77')){
      var div = document.createElement('div');
      div.id = 'websiteImportBtn77';
      div.className = 'actions';
      div.style.marginTop = '10px';
      div.innerHTML = '<button class="btn primary" onclick="openWebsiteImport77()">Website-Kontaktdaten übernehmen</button>';
      help.appendChild(div);
    }

    var topActions = document.querySelector('.top .actions');
    if(topActions && !document.getElementById('websiteTopBtn77')){
      var b = document.createElement('button');
      b.id = 'websiteTopBtn77';
      b.className = 'btn';
      b.type = 'button';
      b.textContent = 'Website-Kontakt';
      b.onclick = window.openWebsiteImport77;
      topActions.appendChild(b);
    }
  }

  var oldRenderContent77 = window.renderContent;
  window.renderContent = function(){
    var r = typeof oldRenderContent77 === 'function' ? oldRenderContent77.apply(this, arguments) : undefined;
    setTimeout(addWebsiteButtons77, 0);
    return r;
  };

  var oldRenderTourResults77 = window.renderTourResults;
  window.renderTourResults = function(){
    var r = typeof oldRenderTourResults77 === 'function' ? oldRenderTourResults77.apply(this, arguments) : undefined;
    setTimeout(addWebsiteButtons77, 0);
    return r;
  };

  setTimeout(addWebsiteButtons77, 500);
})();
