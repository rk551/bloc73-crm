<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>BLOC73 CRM · v87 · Profi-Stand</title>
  <style>
    :root{
      --bg:#101010; --panel:#171717; --panel2:#1f1f1f; --panel3:#242424; --line:#333; --text:#f4f4f4; --muted:#a9a9a9;
      --accent:#d6b46a; --accent2:#f0d28a; --ok:#74d99f; --danger:#ff6b6b; --warn:#ffd166; --info:#80bfff;
      --radius:18px; --shadow:0 18px 45px rgba(0,0,0,.35); --nav:270px;
    }
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;background:radial-gradient(circle at top left,#282218 0,#101010 38%,#0b0b0b 100%);color:var(--text);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    a{color:inherit} button,input,select,textarea{font:inherit} .app{display:grid;grid-template-columns:var(--nav) 1fr;min-height:100vh}
    .side{position:sticky;top:0;height:100vh;padding:22px 16px;background:rgba(12,12,12,.88);border-right:1px solid var(--line);backdrop-filter:blur(14px);overflow:auto}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#373737,#0e0e0e);display:grid;place-items:center;border:1px solid #444;color:var(--accent);font-weight:900;box-shadow:var(--shadow)}
    .brand h1{font-size:16px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.nav{display:grid;gap:8px}.nav button{width:100%;text-align:left;border:1px solid transparent;background:transparent;color:var(--text);padding:11px 12px;border-radius:14px;cursor:pointer;display:flex;justify-content:space-between;gap:8px}.nav button:hover,.nav button.active{background:linear-gradient(135deg,#242424,#171717);border-color:#3a3a3a}.nav small{color:var(--muted)}.footer{margin-top:20px;color:#777;font-size:12px}
    main{padding:24px;max-width:1500px;width:100%;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}.top h2{margin:0;font-size:clamp(25px,3vw,42px);letter-spacing:-.03em}.top p{margin:4px 0 0;color:var(--muted)}
    .actions,.toolbar,.row-actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #414141;background:#202020;color:var(--text);padding:10px 13px;border-radius:13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;justify-content:center}.btn:hover{border-color:#5b5b5b;background:#292929}.btn.primary{background:linear-gradient(135deg,#d6b46a,#9b7635);color:#111;border-color:#e6c77c;font-weight:800}.btn.danger{background:#3b1717;border-color:#743232;color:#ffd0d0}.btn.ok{background:#15341f;border-color:#346b43;color:#d6ffe0}.btn.warn{background:#3b3017;border-color:#806532;color:#ffe2a0}.btn.ghost{background:transparent}.btn:disabled{opacity:.5;cursor:not-allowed}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.panel{background:linear-gradient(180deg,rgba(31,31,31,.96),rgba(20,20,20,.96));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.panel-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.panel h3{margin:0;font-size:16px}.panel-body{padding:16px 18px}.muted{color:var(--muted)}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}.kpi{background:linear-gradient(135deg,#1d1d1d,#141414);border:1px solid #343434;border-radius:18px;padding:17px}.kpi b{font-size:28px;display:block}.kpi span{color:var(--muted)}
    .field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:12px;color:#cfcfcf;font-weight:700}.input,.select,textarea{width:100%;border:1px solid #3b3b3b;background:#121212;color:var(--text);border-radius:14px;padding:11px 12px;outline:none}.input:focus,.select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(214,180,106,.12)}textarea{min-height:90px;resize:vertical}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.form-grid .wide{grid-column:1/-1}.hint{font-size:12px;color:var(--muted);margin-top:6px}.pill{display:inline-flex;gap:6px;align-items:center;padding:5px 9px;border:1px solid #444;border-radius:999px;background:#171717;color:#ddd;font-size:12px}.pill.ok{border-color:#326640;color:#b9ffd0}.pill.warn{border-color:#83652b;color:#ffe0a0}.pill.danger{border-color:#7a3333;color:#ffcaca}.pill.info{border-color:#35608c;color:#cde6ff}
    table{width:100%;border-collapse:collapse}.table-wrap{overflow:auto}th,td{padding:12px;border-bottom:1px solid #2c2c2c;text-align:left;vertical-align:top}th{color:#cfcfcf;font-size:12px;background:#171717;position:sticky;top:0}td{color:#ececec}.empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed #444;border-radius:16px;background:#151515}.searchbar{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:14px}.global-results{display:grid;gap:10px}.result{border:1px solid #343434;background:#171717;border-radius:15px;padding:12px}.result b{color:var(--accent2)}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{border:1px solid #363636;background:linear-gradient(180deg,#1e1e1e,#151515);border-radius:18px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.25)}.card-img{height:138px;background:#0d0d0d;display:grid;place-items:center;color:#777;overflow:hidden}.card-img img{width:100%;height:100%;object-fit:cover}.card-body{padding:14px}.card h3{margin:0 0 4px;font-size:16px}.card p{margin:7px 0;color:#cfcfcf}.card .row-actions{margin-top:12px}
    .tour-layout{display:grid;grid-template-columns:360px 1fr;gap:16px}.status{padding:12px;border:1px solid #3b3b3b;background:#141414;border-radius:14px;color:#d4d4d4}.place-list{display:grid;gap:8px;margin-top:8px}.place-option{padding:10px;border:1px solid #3b3b3b;background:#171717;border-radius:13px;cursor:pointer}.place-option:hover,.place-option.selected{border-color:var(--accent);background:#211d15}.hit-grid{display:grid;gap:12px}.hit{border:1px solid #343434;background:#171717;border-radius:18px;padding:14px}.hit-head{display:flex;justify-content:space-between;gap:12px}.hit h3{margin:0;font-size:17px}.hit-meta{display:flex;gap:7px;flex-wrap:wrap;margin:9px 0}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:90px;border:1px solid #333;background:#151515;border-radius:14px;padding:8px}.day b{font-size:12px;color:#ddd}.event{margin-top:5px;padding:5px 6px;border-radius:9px;background:#2a2418;color:#ffe2a0;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    dialog{width:min(880px,calc(100vw - 28px));border:1px solid #424242;border-radius:22px;background:#151515;color:var(--text);box-shadow:0 28px 80px rgba(0,0,0,.65);padding:0}dialog::backdrop{background:rgba(0,0,0,.65);backdrop-filter:blur(5px)}.modal-head{padding:16px 18px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}.modal-body{padding:18px}.modal-foot{padding:14px 18px;border-top:1px solid #333;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}.x{border:0;background:transparent;color:#eee;font-size:26px;cursor:pointer}
    .notice{border:1px solid #58492a;background:#221c12;color:#ffe7ad;padding:12px;border-radius:15px}.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}.small{font-size:12px}.weekbox{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end}
    @media(max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.nav{grid-template-columns:repeat(2,1fr)}main{padding:16px}.kpis{grid-template-columns:repeat(2,1fr)}.tour-layout{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.form-grid,.split{grid-template-columns:1fr}.top{display:grid}.searchbar{grid-template-columns:1fr}.weekbox{grid-template-columns:1fr}.calendar-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:560px){.nav{grid-template-columns:1fr}.kpis,.cards{grid-template-columns:1fr}.row-actions .btn,.actions .btn{width:100%}th,td{padding:10px}.hit-head{display:grid}.calendar-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">B73</div><div><h1>BLOC73 CRM</h1><p>v87 · Profi-Stand</p></div></div>
    <div class="nav" id="nav"></div>
    <div class="footer">Single-User HTML CRM<br>Daten lokal im Browser + Backup</div>
  </aside>
  <main>
    <div class="top"><div><h2 id="pageTitle">Dashboard</h2><p id="pageSub">Vertrieb, Touren, GRAEF-Wochenberichte, Aufgaben, Kalender und professionelles Instagram-Marketing.</p></div><div class="actions"><button class="btn" onclick="exportBackup()">Backup JSON</button><label class="btn ghost">Backup laden<input type="file" accept="application/json" hidden onchange="importBackup(event)"></label></div></div>
    <section id="content"></section>
  </main>
</div>
<dialog id="modal"><div class="modal-head"><h3 id="modalTitle">Datensatz</h3><button class="x" onclick="closeModal()">×</button></div><form id="recordForm" onsubmit="saveRecord(event)"><div class="modal-body" id="modalBody"></div><div class="modal-foot"><button type="button" class="btn" onclick="closeModal()">Abbrechen</button><button class="btn primary" type="submit">Speichern</button></div></form></dialog>
<script>
'use strict';
const STORE_KEY='bloc73_crm_v10';
let active='dashboard', modalModule='', modalId='', tourState={lat:null,lon:null,place:null,places:[],results:[],loading:false};
const modules={
  dashboard:{title:'Dashboard',sub:'Übersicht, globale Suche und heutige Aufgaben.'},
  customers:{title:'Kunden',sub:'Kunden, Zielgruppen, Besuchsstatus und Potenzial.',label:'Kunde',fields:[['company','Firma','text',true],['target','Zielgruppe','select',false,['Metzgerei','Gastro','Pflegeheim','Krankenhaus','Großküche','Industrie','Händler','Sonstiges']],['status','Status','select',false,['Neu','Bestandskunde','Interessent','Besucht','Nicht relevant']],['address','Adresse','textarea'],['phone','Telefon','tel'],['email','E-Mail','email'],['website','Website','url'],['lastVisit','Letzter Besuch','date'],['graefInfo','GRAEF informiert','select',false,['Nein','Ja']],['nextDate','Wiedervorlage','date'],['notes','Notizen','textarea'],['discussion','Was wurde besprochen?','textarea']]},
  offers:{title:'Angebote',sub:'Angebote inkl. iCloud-Link und PDF-Datei.',label:'Angebot',fields:[['title','Angebot / Projekt','text',true],['customer','Kunde','text'],['product','Maschine / Produkt','text'],['value','Wert netto','number'],['status','Status','select',false,['Entwurf','Gesendet','Nachfassen','Verhandlung','Gewonnen','Verloren']],['offerDate','Angebotsdatum','date'],['followDate','Nachfassen am','date'],['icloudLink','iCloud-Angebotslink','url'],['notes','Notizen','textarea'],['discussion','Was wurde besprochen?','textarea']]},
  tasks:{title:'Aufgaben',sub:'Rückrufe, Wiedervorlagen und offene Arbeiten.',label:'Aufgabe',fields:[['title','Aufgabe','text',true],['customer','Kunde','text'],['type','Typ','select',false,['Rückruf','Nachfassen','Angebot','Besuch','Service','Intern']],['due','Fällig am','date'],['status','Status','select',false,['Offen','Heute','Erledigt','Verschoben']],['notes','Notizen','textarea'],['discussion','Was wurde besprochen?','textarea']]},
  calendar:{title:'CRM-Kalender',sub:'Eigener Kalender innerhalb des CRM.',label:'Termin',fields:[['title','Termin','text',true],['date','Datum','date',true],['time','Uhrzeit','time'],['customer','Kunde','text'],['type','Typ','select',false,['Besuch','Rückruf','Angebot','Service','Intern']],['notes','Notizen','textarea'],['discussion','Was wurde besprochen?','textarea']]},
  tours:{title:'Tagestouren',sub:'Geplante 10er-Touren und Status je Betrieb.',label:'Tour-Eintrag',fields:[['tourDate','Tourdatum','date',true],['order','Reihenfolge','number'],['company','Firma','text',true],['target','Zielgruppe','select',false,['Metzgerei','Gastro','Pflegeheim','Krankenhaus','Großküche','Sonstiges']],['address','Adresse','textarea'],['phone','Telefon','tel'],['website','Website','url'],['status','Status','select',false,['Geplant','Besucht','Nicht erreicht','Nicht relevant']],['graefInfo','GRAEF informiert','select',false,['Nein','Ja']],['visitedAt','Besucht am','date'],['notes','Notizen','textarea'],['discussion','Was wurde besprochen?','textarea']]},
  visited:{title:'Besuchte Kunden',sub:'Dauerhafter Abgleich: diese Betriebe werden bei neuen Touren erkannt.',label:'Besuch',fields:[['company','Firma','text',true],['target','Zielgruppe','select',false,['Metzgerei','Gastro','Pflegeheim','Krankenhaus','Großküche','Sonstiges']],['visitedAt','Besucht am','date',true],['address','Adresse','textarea'],['phone','Telefon','tel'],['website','Website','url'],['notes','Notizen','textarea'],['discussion','Was wurde besprochen?','textarea']]},
  graef:{title:'GRAEF informiert',sub:'Separate Wochenliste für weitergebbare Berichte.',label:'GRAEF-Info',fields:[['company','Firma','text',true],['target','Zielgruppe','select',false,['Metzgerei','Gastro','Pflegeheim','Krankenhaus','Großküche','Sonstiges']],['informedAt','Informiert am','date',true],['week','KW','text'],['address','Adresse','textarea'],['phone','Telefon','tel'],['website','Website','url'],['notes','Notizen','textarea'],['discussion','Was wurde besprochen?','textarea']]},
  products:{title:'Produktkatalog',sub:'Maschinenbereiche für Angebote und Akquise.',label:'Produkt',fields:[['product','Maschine / Produkt','text',true],['manufacturer','Hersteller','select',false,['GRAEF','ZERMAT','Foodlogistik','GASER','DÜKER-REX','Atosa','BLOC73','Sonstiges']],['area','Produktbereich','text'],['page','Website-Link','url'],['image','Bild-URL','url'],['notes','Notizen','textarea']]}
};
const navOrder=['dashboard','customers','offers','tasks','calendar','tourplanner','tours','visited','graef','products'];
const navTitles={tourplanner:{title:'Tourenplanung',sub:'PLZ-/Internet-Suche, automatische Überlaufplanung: 10 Kunden Montag, Rest Dienstag, dann Mittwoch bis Freitag.'}};
const categoryMap={
  metzgerei:{label:'Metzgereien',target:'Metzgerei',query:'Metzgerei Fleischerei Fleischer',osm:['node(around:{r},{lat},{lon})["shop"="butcher"];','way(around:{r},{lat},{lon})["shop"="butcher"];','relation(around:{r},{lat},{lon})["shop"="butcher"];']},
  gastro:{label:'Gastro / Restaurant / Hotel',target:'Gastro',query:'Restaurant Hotel Gastronomie Catering Großküche',osm:['node(around:{r},{lat},{lon})["amenity"~"restaurant|cafe|fast_food|bar|pub"];','way(around:{r},{lat},{lon})["amenity"~"restaurant|cafe|fast_food|bar|pub"];','node(around:{r},{lat},{lon})["tourism"="hotel"];','way(around:{r},{lat},{lon})["tourism"="hotel"];']},
  pflegeheim:{label:'Pflegeheime',target:'Pflegeheim',query:'Pflegeheim Seniorenheim Altenheim Heimküche',osm:['node(around:{r},{lat},{lon})["amenity"="social_facility"]["social_facility"~"nursing_home|assisted_living|group_home"];','way(around:{r},{lat},{lon})["amenity"="social_facility"]["social_facility"~"nursing_home|assisted_living|group_home"];','node(around:{r},{lat},{lon})["amenity"="nursing_home"];','way(around:{r},{lat},{lon})["amenity"="nursing_home"];']},
  krankenhaus:{label:'Krankenhäuser / Kliniken',target:'Krankenhaus',query:'Krankenhaus Klinik Klinikum Reha',osm:['node(around:{r},{lat},{lon})["amenity"="hospital"];','way(around:{r},{lat},{lon})["amenity"="hospital"];','relation(around:{r},{lat},{lon})["amenity"="hospital"];','node(around:{r},{lat},{lon})["healthcare"~"hospital|clinic"];','way(around:{r},{lat},{lon})["healthcare"~"hospital|clinic"];']}
};
const productSeed=[
  ['GRAEF VA 802 / 804 / 806','GRAEF','GRAEF Schneidtechnik','https://bloc73machinery.com/graef-vollautomaten/','Vollautomaten für Metzgerei, LEH, Gastro und Produktion.'],
  ['GRAEF HA 800 / HA 810 / HS / LS','GRAEF','GRAEF Halbautomaten','https://bloc73machinery.com/graef-halbautomaten/','Halbautomaten, Schrägschnitt, Lachs/Fisch-Lösungen.'],
  ['GRAEF Master Line / Bistro / TwinCut','GRAEF','GRAEF Aufschnitttechnik','https://bloc73machinery.com/uebersicht-graef/','Schneidtechnik für Theke, Gastronomie und Fachgeschäft.'],
  ['ZERMAT JazzVac / BluesVac / RockVac','ZERMAT','Tisch-Vakuumgeräte','https://bloc73machinery.com/zermat-vakuumiergeraete/','Vakuumtechnik für kleinere bis mittlere Anwendungen.'],
  ['ZERMAT CV 100 / 200 / 1000 / 1400','ZERMAT','Industrie-Vakuum','https://bloc73machinery.com/zermat-vakuumiergeraete/','Stand- und Hochleistungs-Vakuumtechnik.'],
  ['ZERMAT Traysealer TB-Serie','ZERMAT','Traysealer','https://bloc73machinery.com/zermat-traysealer/','Schalenversiegelung für Handel, Produktion und Verpackung.'],
  ['Foodlogistik Crozzdicr / DicR / ShreddR / SlicR','Foodlogistik','Würfeln / Schneiden','https://bloc73machinery.com/foodlogisitik-uebersicht/','Food-Processing für Würfel, Streifen, Scheiben und Sonderprodukte.'],
  ['GASER Hamburger / Fleischklöße / Spieße / Geflügel','GASER','Formtechnik','https://bloc73machinery.com/gaser/','Formtechnik für Metzgerei, Gastro, Produktion.'],
  ['DÜKER-REX Kutter','DÜKER-REX','Kutter','https://bloc73machinery.com/rex-kutter/','Kuttertechnik für Metzgerei und Verarbeitung.'],
  ['DÜKER-REX Wolftechnik','DÜKER-REX','Wolftechnik','https://bloc73machinery.com/rex-wolftechnik/','Wolftechnik für Produktion und Handwerk.'],
  ['Clips & Schlaufen','BLOC73','Verbrauchsmaterial','https://bloc73machinery.com/clips-und-schlaufen/','Wiederkehrendes Verbrauchsmaterial für Bestandskunden.'],
  ['IB-4 / IB-8 Gefrierblockschneider','BLOC73','Gefrierblockschneider','https://bloc73machinery.com/maschinen-zum-zerkleinern-gefrorener-lebensmittelbloecke/','Zerkleinerung gefrorener Lebensmittelblöcke.'],
  ['Atosa Kühlung','Atosa','Kühltechnik','https://bloc73machinery.com/atosa/','Kühltechnik als Ergänzung im Projektgeschäft.'],
  ['Rauchanlagen / Generatoren','BLOC73','Räuchertechnik','https://bloc73machinery.com/rauchanlagen/','Räuchertechnik, Generatoren und Prozesslösungen.']
];
function freshDB(){return {customers:[],offers:[],tasks:[],calendar:[],tours:[],visited:[],graef:[],products:productSeed.map((p,i)=>({id:uid(),product:p[0],manufacturer:p[1],area:p[2],page:p[3],image:'',notes:p[4],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()})),webHits:[]};}
let db=loadDB();
function uid(){return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function loadDB(){try{const raw=localStorage.getItem(STORE_KEY);const parsed=raw?JSON.parse(raw):null;const base=parsed||freshDB();Object.keys(freshDB()).forEach(k=>{if(!Array.isArray(base[k]))base[k]=[]}); if(!base.products.length) base.products=freshDB().products; return base;}catch(e){return freshDB();}}
function persist(){localStorage.setItem(STORE_KEY,JSON.stringify(db));}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function norm(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();}
function today(){return new Date().toISOString().slice(0,10)}
function formatDate(d){if(!d)return '';try{return new Date(d+'T12:00:00').toLocaleDateString('de-DE')}catch(e){return d}}
function openUrl(u){if(u) window.open(u,'_blank','noopener');}
function init(){renderNav();setActive('dashboard');}
function renderNav(){const nav=document.getElementById('nav');nav.innerHTML=navOrder.map(k=>`<button class="${active===k?'active':''}" onclick="setActive('${k}')"><span>${esc((modules[k]||navTitles[k]).title)}</span><small>${navCount(k)}</small></button>`).join('');}
function navCount(k){if(k==='dashboard'||k==='tourplanner')return ''; return (db[k]||[]).length||'';}
function setActive(k){active=k;renderNav();const meta=modules[k]||navTitles[k];document.getElementById('pageTitle').textContent=meta.title;document.getElementById('pageSub').textContent=meta.sub;renderContent();}
function renderContent(){const c=document.getElementById('content'); if(active==='dashboard')c.innerHTML=dashboardHTML(); else if(active==='tourplanner')c.innerHTML=tourHTML(); else if(active==='calendar')c.innerHTML=calendarHTML(); else if(active==='products')c.innerHTML=productsHTML(); else c.innerHTML=listHTML(active); afterRender();}
function afterRender(){if(active==='tourplanner')renderTourResults(); if(active==='dashboard')runGlobalSearch();}

function dashboardHTML(){
  const todayIso = today();
  const monday = (typeof mondayOfDateString === 'function') ? mondayOfDateString(todayIso) : todayIso;
  const sunday = (typeof addDaysToIso === 'function') ? addDaysToIso(monday,6) : todayIso;
  const next7 = (typeof addDaysToIso === 'function') ? addDaysToIso(todayIso,7) : todayIso;

  function h(v){return esc(v??'');}
  function d(v){return v ? formatDate(v) : '';}
  function inWeek(v){return !!v && String(v)>=String(monday) && String(v)<=String(sunday);}
  function n(v){return Number(String(v||'0').replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,''))||0;}
  function euro(v){return n(v).toLocaleString('de-DE',{maximumFractionDigits:0})+' €';}
  function st(v){return String(v||'').toLowerCase();}
  function isOpenOffer(o){const s=st(o.status);return !/gewonnen|verloren|abgesagt|storniert|erledigt/.test(s);}
  function unique(rows){
    const seen={};
    return rows.filter(r=>{
      const k=String((r.company||r.customer||r.title||'')+' '+(r.address||'')).toLowerCase().replace(/[^a-z0-9äöüß]+/g,' ').trim();
      if(!k||seen[k])return false;seen[k]=true;return true;
    });
  }
  function textOf(r){return String([r.company,r.customer,r.title,r.target,r.status,r.notes,r.discussion,r.product,r.area,r.type,r.address].filter(Boolean).join(' ')).toLowerCase();}
  function dguvPotential(r){return /dguv|prüfung|pruefung|betriebsmittel|wartung|service|maschinenprüfung|sicherheitsprüfung|metzgerei|fleischerei|gastro|pflegeheim|krankenhaus|großküche|grosskueche/.test(textOf(r));}
  function bar(label,val,max){
    const w=max?Math.max(3,Math.round((val/max)*100)):0;
    return `<div style="margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:4px"><span>${h(label)}</span><b>${h(val)}</b></div>
      <div style="height:9px;background:#101010;border:1px solid #333;border-radius:999px;overflow:hidden"><div style="height:100%;width:${w}%;background:linear-gradient(135deg,#d6b46a,#8a6428)"></div></div>
    </div>`;
  }

  const tours=db.tours||[], visited=db.visited||[], offers=db.offers||[], tasks=db.tasks||[], graef=db.graef||[], letters=db.letters||[];
  const toursWeek=tours.filter(t=>inWeek(t.tourDate));
  const toursOpen=toursWeek.filter(t=>!st(t.status).includes('besucht'));
  const toursDone=toursWeek.filter(t=>st(t.status).includes('besucht'));
  const visitedWeek=visited.filter(v=>inWeek(v.visitedAt));
  const graefWeek=graef.filter(g=>inWeek(g.informedAt));
  const openOffers=offers.filter(isOpenOffer);
  const wonOffers=offers.filter(o=>st(o.status).includes('gewonnen'));
  const lostOffers=offers.filter(o=>st(o.status).includes('verloren'));
  const openOfferValue=openOffers.reduce((s,o)=>s+n(o.value),0);
  const wonOfferValue=wonOffers.reduce((s,o)=>s+n(o.value),0);
  const closeBase=wonOffers.length+lostOffers.length;
  const closeRate=closeBase?Math.round((wonOffers.length/closeBase)*100):0;
  const dueTasks=tasks.filter(t=>st(t.status)!=='erledigt' && t.due && t.due<=todayIso);
  const nextTasks=tasks.filter(t=>st(t.status)!=='erledigt' && t.due && t.due>todayIso && t.due<=next7);
  const dueOffers=openOffers.filter(o=>o.followDate && o.followDate<=todayIso);
  const nextOffers=openOffers.filter(o=>o.followDate && o.followDate>todayIso && o.followDate<=next7);
  const dguv=unique([...(db.customers||[]),...tours,...visited].filter(dguvPotential));

  const firstLetters=letters.filter(l=>String(l.type||'').toLowerCase()==='erst').length;
  const dguvLetters=letters.filter(l=>String(l.type||'').toLowerCase()==='dguv').length;
  const followLetters=letters.filter(l=>String(l.type||'').toLowerCase()==='folge').length;

  const actions=[
    ...dueOffers.map(o=>({kind:'Angebot fällig',date:o.followDate,title:o.title||o.customer||'Angebot',sub:o.customer||o.product||'',module:'offers'})),
    ...dueTasks.map(t=>({kind:'Aufgabe fällig',date:t.due,title:t.title||'Aufgabe',sub:t.customer||t.type||'',module:'tasks'})),
    ...toursOpen.slice(0,10).map(t=>({kind:'Tour offen',date:t.tourDate,title:t.company||'Tourkunde',sub:(t.target||'')+' · '+(t.address||''),module:'tours'})),
    ...nextOffers.map(o=>({kind:'Nachfassen',date:o.followDate,title:o.title||o.customer||'Angebot',sub:o.customer||o.product||'',module:'offers'})),
    ...nextTasks.map(t=>({kind:'Aufgabe',date:t.due,title:t.title||'Aufgabe',sub:t.customer||t.type||'',module:'tasks'}))
  ].sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).slice(0,14);

  const actionRows = actions.length ? actions.map(a=>`
    <tr>
      <td><span class="pill warn">${h(a.kind)}</span></td>
      <td>${h(d(a.date))}</td>
      <td><b>${h(a.title)}</b><br><span class="muted small">${h(a.sub)}</span></td>
      <td><button class="btn" onclick="setActive('${h(a.module)}')">Öffnen</button></td>
    </tr>`).join('') : '<tr><td colspan="4"><div class="empty">Keine dringenden Punkte. Sauber.</div></td></tr>';

  const offerStages=[
    ['Entwurf',offers.filter(o=>st(o.status).includes('entwurf')).length],
    ['Gesendet',offers.filter(o=>st(o.status).includes('gesendet')).length],
    ['Nachfassen',offers.filter(o=>st(o.status).includes('nachfassen')).length],
    ['Verhandlung',offers.filter(o=>st(o.status).includes('verhandlung')).length],
    ['Gewonnen',wonOffers.length],
    ['Verloren',lostOffers.length]
  ];
  const maxStage=Math.max(...offerStages.map(x=>x[1]),1);

  const targetCounts={};
  unique([...toursWeek,...visitedWeek]).forEach(r=>{const t=r.target||'Sonstiges';targetCounts[t]=(targetCounts[t]||0)+1;});
  const targetRows=Object.keys(targetCounts).sort((a,b)=>targetCounts[b]-targetCounts[a]).slice(0,8);
  const maxTarget=Math.max(...targetRows.map(k=>targetCounts[k]),1);

  return `
    <div class="panel">
      <div class="panel-head">
        <div>
          <h3>Vertriebs-Cockpit</h3>
          <div class="muted">Profi-Übersicht ohne Kundenliste und ohne Suchblock. Fokus: Steuerung, Prioritäten, Angebote, Touren, DGUV.</div>
        </div>
        <div class="actions">
          <button class="btn" onclick="setActive('tourplanner')">Tour planen</button>
          <button class="btn" onclick="setActive('tours')">Tagestouren</button>
          <button class="btn" onclick="setActive('offers')">Angebote</button>
          <button class="btn" onclick="setActive('tasks')">Aufgaben</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="notice"><b>Aktuelle Woche:</b> ${h(d(monday))} bis ${h(d(sunday))} · Ziel: Besuche abschließen, Angebote nachfassen, DGUV-Potenzial sichern.</div>
        <div style="height:14px"></div>
        <div class="kpis">
          <div class="kpi"><b>${h(toursDone.length+visitedWeek.length)}</b><span>Besuche / Abschlüsse KW</span></div>
          <div class="kpi"><b>${h(toursOpen.length)}</b><span>offene Tourkontakte KW</span></div>
          <div class="kpi"><b>${h(openOffers.length)}</b><span>offene Angebote</span></div>
          <div class="kpi"><b>${h(euro(openOfferValue))}</b><span>offener Angebotswert</span></div>
        </div>
        <div class="kpis">
          <div class="kpi"><b>${h(dueTasks.length+dueOffers.length)}</b><span>heute / überfällig</span></div>
          <div class="kpi"><b>${h(graefWeek.length)}</b><span>GRAEF informiert KW</span></div>
          <div class="kpi"><b>${h(dguv.length)}</b><span>DGUV-Potenzial</span></div>
          <div class="kpi"><b>${h(closeRate)}%</b><span>Abschlussquote</span></div>
        </div>
      </div>
    </div>

    <div class="grid" style="margin-top:16px">
      <div class="panel" style="grid-column:span 7">
        <div class="panel-head"><h3>Prioritäten / nächste Schritte</h3><button class="btn primary" onclick="setActive('tasks')">Aufgaben öffnen</button></div>
        <div class="table-wrap"><table><thead><tr><th>Typ</th><th>Datum</th><th>Vorgang</th><th>Aktion</th></tr></thead><tbody>${actionRows}</tbody></table></div>
      </div>
      <div class="panel" style="grid-column:span 5">
        <div class="panel-head"><h3>Angebots-Pipeline</h3><button class="btn" onclick="setActive('offers')">Angebote öffnen</button></div>
        <div class="panel-body">
          ${offerStages.map(x=>bar(x[0],x[1],maxStage)).join('')}
          <div class="notice"><b>Gewonnener Wert:</b> ${h(euro(wonOfferValue))} · <b>Offener Wert:</b> ${h(euro(openOfferValue))}</div>
        </div>
      </div>
    </div>

    <div class="grid" style="margin-top:16px">
      <div class="panel" style="grid-column:span 4"><div class="panel-head"><h3>Wochenleistung</h3></div><div class="panel-body">
        ${bar('Tourkontakte geplant',toursWeek.length,Math.max(toursWeek.length,1))}
        ${bar('Besuche abgeschlossen',toursDone.length+visitedWeek.length,Math.max(toursWeek.length,visitedWeek.length,1))}
        ${bar('GRAEF informiert',graefWeek.length,Math.max(toursWeek.length,graefWeek.length,1))}
        ${bar('offene Tourkontakte',toursOpen.length,Math.max(toursWeek.length,1))}
      </div></div>
      <div class="panel" style="grid-column:span 4"><div class="panel-head"><h3>Zielgruppen KW</h3></div><div class="panel-body">
        ${targetRows.length?targetRows.map(k=>bar(k,targetCounts[k],maxTarget)).join(''):'<div class="empty">Noch keine Wochenkontakte.</div>'}
      </div></div>
      <div class="panel" style="grid-column:span 4"><div class="panel-head"><h3>Briefe / Kontaktimpulse</h3></div><div class="panel-body">
        <div class="kpi" style="margin-bottom:10px"><b>${h(firstLetters)}</b><span>Erstbesuch-Briefe</span></div>
        <div class="kpi" style="margin-bottom:10px"><b>${h(dguvLetters)}</b><span>DGUV-Briefe</span></div>
        <div class="kpi"><b>${h(followLetters)}</b><span>Folgebesuch-Briefe</span></div>
      </div></div>
    </div>
  `;
}
function quickSearch(q){document.getElementById('globalQ').value=q;runGlobalSearch();}
function runGlobalSearch(){const box=document.getElementById('globalResults');if(!box)return;const q=norm(document.getElementById('globalQ')?.value||'');const rows=[];['customers','offers','tasks','calendar','tours','visited','graef','products'].forEach(m=>(db[m]||[]).forEach(r=>{if(!q||norm(JSON.stringify(r)).includes(q))rows.push({m,r})}));box.innerHTML=rows.slice(0,35).map(x=>`<div class="result"><span class="pill">${esc(modules[x.m].title)}</span> <b>${esc(x.r.company||x.r.title||x.r.product||'Datensatz')}</b><div class="muted small">${esc([x.r.target,x.r.address,x.r.status,x.r.product,x.r.date,x.r.due,x.r.notes].filter(Boolean).join(' · ')).slice(0,240)}</div></div>`).join('')||'<div class="empty">Keine Treffer.</div>';}
function listHTML(m){const meta=modules[m];const rows=db[m]||[];return `<div class="panel"><div class="panel-head"><div><h3>${esc(meta.title)}</h3><div class="muted">${esc(meta.sub)}</div></div><div class="toolbar"><input class="input" id="listQ" placeholder="Suchen …" oninput="filterTable('${m}')"><button class="btn primary" onclick="openModal('${m}')">+ ${esc(meta.label)}</button><button class="btn" onclick="exportCSV('${m}')">CSV</button></div></div><div class="table-wrap"><table><thead>${tableHead(m)}</thead><tbody id="tableBody">${tableRows(m,rows)}</tbody></table></div></div>`}
function tableHead(m){const cols={customers:['Firma','Zielgruppe','Status','Adresse','Aktion'],offers:['Angebot','Kunde','Produkt','Status','Nachfassen','Aktion'],tasks:['Aufgabe','Kunde','Fällig','Status','Aktion'],tours:['Datum','Nr.','Firma','Status','GRAEF','Besprochen','Aktion'],visited:['Firma','Zielgruppe','Besucht am','Adresse','Besprochen','Aktion'],graef:['Firma','KW','Informiert am','Zielgruppe','Besprochen','Aktion']};return '<tr>'+ (cols[m]||['Name','Details','Aktion']).map(h=>`<th>${h}</th>`).join('')+'</tr>';}
function tableRows(m,rows){if(!rows.length)return `<tr><td colspan="9"><div class="empty">Noch keine Datensätze.</div></td></tr>`;return rows.map(r=>rowHTML(m,r)).join('');}
function rowHTML(m,r){const act=`<div class="row-actions"><button class="btn" onclick="openModal('${m}','${r.id}')">Bearbeiten</button><button class="btn danger" onclick="deleteRecord('${m}','${r.id}')">Löschen</button></div>`;if(m==='customers')return `<tr><td><b>${esc(r.company)}</b><br><span class="muted small">${esc(r.phone||'')}</span></td><td>${pill(r.target)}</td><td>${pill(r.status)}</td><td>${esc(r.address||'')}</td><td>${act}</td></tr>`;if(m==='offers')return `<tr><td><b>${esc(r.title)}</b><br><span class="muted small">${esc(r.value||'')} €</span></td><td>${esc(r.customer||'')}</td><td>${esc(r.product||'')}</td><td>${pill(r.status)}</td><td>${formatDate(r.followDate)}</td><td><div class="row-actions"><button class="btn" onclick="openOfferPdf('${r.id}')">PDF</button>${r.icloudLink?`<button class="btn" onclick="openUrl('${esc(r.icloudLink)}')">iCloud</button>`:''}<button class="btn" onclick="addCalendarFromRecord('offers','${r.id}')">Kalender</button><button class="btn" onclick="openModal('offers','${r.id}')">Bearbeiten</button></div></td></tr>`;if(m==='tasks')return `<tr><td><b>${esc(r.title)}</b></td><td>${esc(r.customer||'')}</td><td>${formatDate(r.due)}</td><td>${pill(r.status)}</td><td>${act}</td></tr>`;if(m==='tours')return `<tr><td>${formatDate(r.tourDate)}</td><td>${esc(r.order||'')}</td><td><b>${esc(r.company)}</b><br><span class="muted small">${esc(r.address||'')}</span></td><td>${pill(r.status)}</td><td>${pill(r.graefInfo||'Nein')}</td><td>${esc((r.discussion||'').slice(0,120))}</td><td><div class="row-actions"><button class="btn ok" onclick="markTourVisited('${r.id}')">Besucht</button><button class="btn warn" onclick="markTourGraef('${r.id}')">GRAEF</button><button class="btn" onclick="openMapsFor('${esc(r.address||r.company)}')">Route</button><button class="btn" onclick="openModal('tours','${r.id}')">Bearbeiten</button><button class="btn danger" onclick="deleteTourRecord('${r.id}')">Abschluss</button></div></td></tr>`;if(m==='visited')return `<tr><td><b>${esc(r.company)}</b></td><td>${pill(r.target)}</td><td>${formatDate(r.visitedAt)}</td><td>${esc(r.address||'')}</td><td>${esc((r.discussion||'').slice(0,120))}</td><td>${act}</td></tr>`;if(m==='graef')return `<tr><td><b>${esc(r.company)}</b><br><span class="muted small">${esc(r.address||'')}</span></td><td>${esc(r.week||'')}</td><td>${formatDate(r.informedAt)}</td><td>${pill(r.target)}</td><td>${esc((r.discussion||'').slice(0,120))}</td><td>${act}</td></tr>`;return `<tr><td><b>${esc(r.title||r.product||r.company||'Datensatz')}</b></td><td>${esc(JSON.stringify(r).slice(0,160))}</td><td>${act}</td></tr>`}
function pill(v){if(!v)return '';let cls='';if(['Ja','Besucht','Gewonnen','Erledigt'].includes(v))cls='ok';if(['Nein','Offen','Geplant','Nachfassen'].includes(v))cls='warn';if(['Verloren','Nicht relevant'].includes(v))cls='danger';return `<span class="pill ${cls}">${esc(v)}</span>`}
function filterTable(m){const q=norm(document.getElementById('listQ').value||'');const rows=(db[m]||[]).filter(r=>!q||norm(JSON.stringify(r)).includes(q));document.getElementById('tableBody').innerHTML=tableRows(m,rows);}
function openModal(m,id=''){modalModule=m;modalId=id;const meta=modules[m];const rec=(db[m]||[]).find(x=>x.id===id)||{};document.getElementById('modalTitle').textContent=(id?'Bearbeiten: ':'Neu: ')+meta.label;let html='<div class="form-grid">';meta.fields.forEach(f=>{const [key,label,type,req,opts]=f;const val=rec[key]||'';const wide=(type==='textarea'||key==='address'||key==='notes'||key==='discussion'||key==='icloudLink')?' wide':'';html+=`<div class="field${wide}"><label>${esc(label)}</label>`;if(type==='select')html+=`<select class="select" name="${key}" ${req?'required':''}>${(opts||[]).map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('')}</select>`;else if(type==='textarea')html+=`<textarea name="${key}" ${req?'required':''}>${esc(val)}</textarea>`;else html+=`<input class="input" type="${type}" name="${key}" value="${esc(val)}" ${req?'required':''}>`;html+='</div>';});
if(m==='offers')html+=`<div class="field wide"><label>Angebots-PDF direkt laden</label><input class="input" type="file" id="offerPdfInput" accept="application/pdf"><div class="hint">PDF wird im Browser-Speicher dieses Geräts abgelegt. Für geräteübergreifend zusätzlich iCloud-Link eintragen.</div>${id?`<button type="button" class="btn" onclick="openOfferPdf('${id}')">Gespeicherte PDF öffnen</button>`:''}</div>`;
html+='</div>';document.getElementById('modalBody').innerHTML=html;document.getElementById('modal').showModal();}
function closeModal(){document.getElementById('modal').close();modalModule='';modalId='';}
async function saveRecord(e){e.preventDefault();const fd=new FormData(e.target);const obj={};for(const [k,v] of fd.entries())obj[k]=v;let arr=db[modalModule]||[];if(modalId){const idx=arr.findIndex(x=>x.id===modalId);arr[idx]={...arr[idx],...obj,updatedAt:new Date().toISOString()};}else{obj.id=uid();obj.createdAt=new Date().toISOString();obj.updatedAt=obj.createdAt;arr.unshift(obj);modalId=obj.id;}db[modalModule]=arr;persist();if(modalModule==='offers'){const file=document.getElementById('offerPdfInput')?.files?.[0];if(file)await saveOfferPdf(modalId,file);}closeModal();renderContent();renderNav();}
function deleteRecord(m,id){if(!confirm('Datensatz wirklich löschen?'))return;db[m]=(db[m]||[]).filter(x=>x.id!==id);persist();renderContent();renderNav();}
function deleteTourRecord(id){const t=(db.tours||[]).find(x=>x.id===id);const name=t?.company||'diesen Tour-Eintrag';const date=t?.tourDate?(' am '+formatDate(t.tourDate)):'';if(!confirm('Tagestour-Eintrag wirklich löschen?\n\n'+name+date+' wird aus der geplanten Tour entfernt. Der Betrieb bleibt in besuchte Kunden/Leads/Kalender erhalten, falls er dort bereits gespeichert wurde.'))return;db.tours=(db.tours||[]).filter(x=>x.id!==id);persist();renderContent();renderNav();}
// PDF storage
let idb=null;function openIDB(){return new Promise((resolve,reject)=>{if(idb)return resolve(idb);const req=indexedDB.open('bloc73_crm_files_v10',1);req.onupgradeneeded=()=>req.result.createObjectStore('files');req.onsuccess=()=>{idb=req.result;resolve(idb)};req.onerror=()=>reject(req.error);});}
async function saveOfferPdf(id,file){const database=await openIDB();return new Promise((resolve,reject)=>{const tx=database.transaction('files','readwrite');tx.objectStore('files').put({name:file.name,type:file.type,blob:file,date:new Date().toISOString()},'offer_'+id);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error);});}
async function openOfferPdf(id){try{const database=await openIDB();const rec=await new Promise((resolve,reject)=>{const tx=database.transaction('files','readonly');const req=tx.objectStore('files').get('offer_'+id);req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error);});if(rec?.blob){const url=URL.createObjectURL(rec.blob);window.open(url,'_blank');setTimeout(()=>URL.revokeObjectURL(url),60000);return;}const offer=db.offers.find(o=>o.id===id);if(offer?.icloudLink){openUrl(offer.icloudLink);return;}alert('Keine PDF gespeichert und kein iCloud-Link hinterlegt.');}catch(e){alert('PDF konnte nicht geöffnet werden: '+e.message);}}

function tourHTML(){const monday=currentWeekStart();const week=weekKeyFromStart(monday);return `<div class="tour-layout"><aside class="panel"><div class="panel-head"><h3>Tour suchen & planen</h3></div><div class="panel-body"><div class="notice"><b>Neu in v14:</b> Die Suche darf mehr als 10 Treffer liefern. Beim Speichern verteilt die App automatisch 10 Betriebe pro Tag von Montag bis Freitag. Neu: Betriebe mit Status Besucht, Lead, Wiedervorlage, Kein Interesse oder Nicht vorhanden verschwinden aus der normalen Planung. Mögliche Doppelbesuche werden vor dem Speichern gemeldet und müssen bestätigt werden.</div><div style="height:12px"></div><div class="field"><label>Zielgruppe</label><select id="tourCat" class="select"><option value="metzgerei">Metzgereien</option><option value="gastro">Gastro / Restaurant / Hotel</option><option value="pflegeheim">Pflegeheime</option><option value="krankenhaus">Krankenhäuser / Kliniken</option></select></div><div class="field"><label>PLZ oder Ort</label><input id="placeQuery" class="input" placeholder="z. B. 09111 Chemnitz, Dresden, Leipzig"><div class="hint">Erst PLZ/Ort prüfen, dann Tourensuche starten. Alternativ Standort nutzen.</div></div><div class="actions"><button class="btn primary" onclick="findPlaces()">PLZ/Ort prüfen</button><button class="btn" onclick="useMyLocation()">Meinen Standort nutzen</button></div><div id="placeOptions" class="place-list"></div><div class="split"><div class="field"><label>Radius</label><select id="tourRadius" class="select"><option value="3000">3 km</option><option value="5000">5 km</option><option value="10000" selected>10 km</option><option value="20000">20 km</option><option value="50000">50 km</option></select></div><div class="field"><label>Kunden pro Tag</label><input id="tourLimit" class="input" type="number" min="1" max="10" value="10"><div class="hint">Für die Wochenplanung werden Montag bis Freitag jeweils bis zu 10 Kunden gespeichert.</div></div></div><div class="panel" style="box-shadow:none;margin:12px 0"><div class="panel-head"><h3>Woche & Tourtag</h3></div><div class="panel-body"><div class="field"><label>Wochenstart Montag</label><input id="tourWeekStart" class="input" type="date" value="${monday}" onchange="setPlannerMondayFromDate()"><div class="hint">Du wählst nur den Montag der Woche. Die KW wird automatisch berechnet.</div></div><div class="split"><div class="field"><label>Tourtag</label><select id="tourDayOffset" class="select" onchange="updatePlannerTourDate()"><option value="0">Montag</option><option value="1">Dienstag</option><option value="2">Mittwoch</option><option value="3">Donnerstag</option><option value="4">Freitag</option><option value="5">Samstag</option></select></div><div class="field"><label>Tourdatum</label><input id="tourDate" class="input" type="date" value="${monday}" readonly></div></div><div class="actions"><span class="pill info" id="tourKwLabel">${week} · ${formatDate(monday)} bis ${formatDate(addDaysToIso(monday,6))}</span><button class="btn ghost" onclick="setPlannerMondayToday()">Diese Woche</button><button class="btn ghost" onclick="shiftPlannerWeek(-1)">← Vorwoche</button><button class="btn ghost" onclick="shiftPlannerWeek(1)">Nächste Woche →</button></div></div></div><label class="pill"><input type="checkbox" id="hideVisited" checked> Bearbeitete / besuchte ausblenden</label><div style="height:12px"></div><div class="actions"><button class="btn primary" onclick="runTourSearch()">Tourensuche starten</button><button class="btn ok" onclick="createWorkWeekTour()">Woche Mo–Fr automatisch verteilen</button><button class="btn" onclick="createDayTour()">Nur gewählten Tag speichern</button><button class="btn" onclick="openGoogleSearch()">Google Maps Backup</button></div><div style="height:12px"></div><div id="tourStatus" class="status">Noch keine Suche gestartet.</div><div style="height:16px"></div><div class="panel" style="box-shadow:none"><div class="panel-head"><h3>Wochenexport</h3></div><div class="panel-body"><div class="field"><label>Export-Woche Start Montag</label><input class="input" type="date" id="tourWeekExportStart" value="${monday}" onchange="setExportMondayFromDate('tourWeekExportStart','tourExportKwLabel')"><div class="hint" id="tourExportKwLabel">${week} · ${formatDate(monday)} bis ${formatDate(addDaysToIso(monday,6))}</div></div><div class="actions"><button class="btn primary" onclick="exportTourWeekExcel()">Woche Excel herunterladen</button><button class="btn" onclick="exportTourWeekPDF()">Tour Woche PDF</button></div><div style="height:12px"></div><div class="field"><label>GRAEF-Woche Start Montag</label><input class="input" type="date" id="weekExportStart" value="${monday}" onchange="setExportMondayFromDate('weekExportStart','graefExportKwLabel')"><div class="hint" id="graefExportKwLabel">${week} · ${formatDate(monday)} bis ${formatDate(addDaysToIso(monday,6))}</div></div><div class="actions"><button class="btn warn" onclick="exportGraefWeekPDF()">GRAEF PDF</button><button class="btn ghost" onclick="setActive('graef')">GRAEF-Liste öffnen</button></div><div class="hint">GRAEF wird bewusst nur als PDF ausgegeben. Die allgemeine Tourenwoche kann als Excel und PDF gespeichert werden.</div></div></div></div></aside><section><div class="kpis"><div class="kpi"><b id="tourHitCount">0</b><span>Treffer</span></div><div class="kpi"><b>${db.visited.length}</b><span>besucht gespeichert</span></div><div class="kpi"><b>${db.tours.filter(t=>t.tourDate===today()).length}</b><span>Tour heute</span></div><div class="kpi"><b>${db.graef.filter(g=>g.week===week).length}</b><span>GRAEF aktuelle KW</span></div></div><div class="panel"><div class="panel-head"><div><h3>Gefundene Betriebe</h3><div class="muted">OpenStreetMap/Overpass. Fehlende Telefonnummern bitte über Google Maps ergänzen.</div></div><input class="input" style="max-width:280px" id="hitFilter" placeholder="Treffer filtern …" oninput="renderTourResults()"></div><div class="panel-body"><div id="tourResults" class="hit-grid"></div></div></div></section></div>`}
function setTourStatus(msg){const el=document.getElementById('tourStatus');if(el)el.textContent=msg;}
async function findPlaces(){const q=document.getElementById('placeQuery').value.trim();if(!q){alert('Bitte PLZ oder Ort eingeben.');return;}setTourStatus('PLZ/Ort wird gesucht …');try{const url='https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&countrycodes=de&q='+encodeURIComponent(q);const res=await fetch(url,{headers:{'Accept':'application/json'}});if(!res.ok)throw new Error('Ortssuche nicht erreichbar');const data=await res.json();tourState.places=data.map(p=>({label:p.display_name,lat:Number(p.lat),lon:Number(p.lon)}));renderPlaceOptions();if(tourState.places[0])selectPlace(0);setTourStatus(tourState.places.length?`${tourState.places.length} Ort/PLZ-Treffer gefunden. Bitte passenden Ort wählen und Tourensuche starten.`:'Kein Ort gefunden. Bitte PLZ/Ort genauer eingeben.');}catch(e){setTourStatus('PLZ/Ort-Suche fehlgeschlagen. Prüfe Internetverbindung oder nutze Standortfreigabe. '+e.message);}}
function renderPlaceOptions(){const box=document.getElementById('placeOptions');if(!box)return;box.innerHTML=tourState.places.map((p,i)=>`<div class="place-option ${tourState.place===i?'selected':''}" onclick="selectPlace(${i})"><b>${esc(p.label.split(',')[0])}</b><div class="muted small">${esc(p.label)}</div></div>`).join('');}
function selectPlace(i){tourState.place=i;const p=tourState.places[i];if(p){tourState.lat=p.lat;tourState.lon=p.lon;}renderPlaceOptions();}
function useMyLocation(){if(!navigator.geolocation){alert('Standortfreigabe wird vom Browser nicht unterstützt.');return;}setTourStatus('Standort wird abgefragt …');navigator.geolocation.getCurrentPosition(pos=>{tourState.lat=pos.coords.latitude;tourState.lon=pos.coords.longitude;tourState.place=null;setTourStatus('Standort gesetzt. Jetzt Tourensuche starten.');},err=>setTourStatus('Standortfreigabe nicht möglich: '+err.message+'. Nutze PLZ/Ort.'),{enableHighAccuracy:true,timeout:15000,maximumAge:60000});}
async function runTourSearch(){const cat=document.getElementById('tourCat').value;const radius=Number(document.getElementById('tourRadius').value);if(!tourState.lat||!tourState.lon){await findPlaces(); if(!tourState.lat||!tourState.lon)return;}tourState.loading=true;tourState.results=[];renderTourResults();setTourStatus('Internet-Suche läuft …');try{let hits=await fetchOverpass(cat,radius,tourState.lat,tourState.lon);if(document.getElementById('hideVisited').checked)hits=hits.filter(h=>!isVisited(h));tourState.results=hits;tourState.loading=false;setTourStatus(`${hits.length} passende Betriebe gefunden. Bei „Woche Mo–Fr speichern“ werden die Treffer automatisch als Überlauf verteilt: 10 Montag, 10 Dienstag, 10 Mittwoch, 10 Donnerstag, 10 Freitag.`);renderTourResults();}catch(e){tourState.loading=false;setTourStatus('Suche fehlgeschlagen: '+e.message+'. Nutze Google Maps Backup oder reduziere/ändere Radius.');renderTourResults();}}
async function fetchOverpass(cat,radius,lat,lon){const cfg=categoryMap[cat];const bodyParts=cfg.osm.map(q=>q.replaceAll('{r}',radius).replaceAll('{lat}',lat).replaceAll('{lon}',lon)).join('\n');const query=`[out:json][timeout:30];\n(\n${bodyParts}\n);\nout center tags 100;`;const endpoints=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];let lastErr=null;for(const ep of endpoints){try{const res=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:'data='+encodeURIComponent(query)});if(!res.ok)throw new Error(res.status+' '+res.statusText);const data=await res.json();return normalizeOverpass(data.elements||[],cfg,lat,lon);}catch(e){lastErr=e;}}throw new Error('OpenStreetMap/Overpass nicht erreichbar: '+(lastErr?.message||''));}
function normalizeOverpass(elements,cfg,lat,lon){const seen=new Set();const out=[];for(const el of elements){const t=el.tags||{};const eLat=el.lat||(el.center&&el.center.lat);const eLon=el.lon||(el.center&&el.center.lon);if(!eLat||!eLon)continue;const company=t.name||t.operator||cfg.target+' ohne Namen';const address=formatAddress(t);const key=norm(company+' '+address);if(seen.has(key))continue;seen.add(key);const dist=Math.round(distance(lat,lon,eLat,eLon));out.push({company,target:cfg.target,address,phone:t.phone||t['contact:phone']||'',website:t.website||t['contact:website']||'',lat:eLat,lon:eLon,distanceMeters:dist,distance:dist<1000?dist+' m':(dist/1000).toFixed(1).replace('.',',')+' km',notes:osmNotes(t)});}return out.sort((a,b)=>a.distanceMeters-b.distanceMeters);}
function formatAddress(t){return [t['addr:street']&&((t['addr:street']||'')+' '+(t['addr:housenumber']||'')),[t['addr:postcode'],t['addr:city']].filter(Boolean).join(' ')].filter(Boolean).join(', ');}
function osmNotes(t){return Object.entries(t).filter(([k])=>['opening_hours','cuisine','brand','operator','healthcare','social_facility'].includes(k)).map(([k,v])=>k+': '+v).join('\n');}
function distance(a,b,c,d){const R=6371000,rad=x=>x*Math.PI/180;const dLat=rad(c-a),dLon=rad(d-b);const s=Math.sin(dLat/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));}
function renderTourResults(){const box=document.getElementById('tourResults');if(!box)return;const q=norm(document.getElementById('hitFilter')?.value||'');let rows=tourState.results.filter(h=>!q||norm(JSON.stringify(h)).includes(q));const cnt=document.getElementById('tourHitCount');if(cnt)cnt.textContent=rows.length;if(tourState.loading){box.innerHTML='<div class="empty">Suche läuft …</div>';return;}box.innerHTML=rows.length?rows.map((h,i)=>hitCard(h,i)).join(''):'<div class="empty">Keine Treffer. PLZ/Ort eingeben, prüfen und Tourensuche starten.</div>';}
function hitCard(h,i){const visited=isVisited(h);const graef=isGraef(h);return `<div class="hit"><div class="hit-head"><div><h3>${esc(h.company)}</h3><div class="muted small">${esc(h.address||'Adresse fehlt')} · ${esc(h.distance||'')}</div></div><div>${visited?pill('Besucht'):''} ${graef?pill('GRAEF informiert'):''}</div></div><div class="hit-meta">${pill(h.target)}${h.phone?pill(h.phone):''}${h.website?pill('Website'):''}</div><div class="field"><label>Was wurde besprochen?</label><textarea id="hitTalk_${i}" placeholder="Kurznotiz zum Gespräch, Bedarf, Einwand, Interesse, nächster Schritt …">${esc(h.discussion||'')}</textarea></div><div class="row-actions"><button class="btn" onclick="openHitMaps(${i})">Route</button>${h.phone?`<a class="btn" href="tel:${esc(h.phone)}">Anrufen</a>`:''}${h.website?`<button class="btn" onclick="openUrl('${esc(h.website)}')">Website</button>`:''}<button class="btn ok" onclick="markHitVisited(${i})">Besucht speichern</button><button class="btn warn" onclick="markHitGraef(${i})">GRAEF informiert</button><button class="btn primary" onclick="addHitAsCustomer(${i})">Als Kunde</button></div></div>`}
function hitKey(h){return norm((h.company||'')+' '+(h.address||''));}
function isVisited(h){const k=hitKey(h);return db.visited.some(v=>hitKey(v)===k)||db.tours.some(t=>hitKey(t)===k&&t.status==='Besucht');}
function isGraef(h){const k=hitKey(h);return db.graef.some(g=>hitKey(g)===k);}
function readHitDiscussion(i){return document.getElementById('hitTalk_'+i)?.value?.trim()||'';}
function addHitAsCustomer(i){const h=tourState.results[i];if(!h)return;h.discussion=readHitDiscussion(i);db.customers.unshift({id:uid(),company:h.company,target:h.target,status:'Interessent',address:h.address,phone:h.phone,email:'',website:h.website,lastVisit:'',graefInfo:isGraef(h)?'Ja':'Nein',nextDate:'',notes:h.notes,discussion:h.discussion,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});persist();renderNav();alert('Als Kunde gespeichert.');}
function markHitVisited(i){const h=tourState.results[i];if(!h)return;h.discussion=readHitDiscussion(i);saveVisited(h);renderContent();}
function markHitGraef(i){const h=tourState.results[i];if(!h)return;h.discussion=readHitDiscussion(i);saveGraef(h);renderContent();}
function saveVisited(h){const k=hitKey(h);const existing=db.visited.find(v=>hitKey(v)===k);const data={company:h.company,target:h.target,visitedAt:h.visitedAt||today(),address:h.address,phone:h.phone,website:h.website,notes:h.notes,discussion:h.discussion||'',updatedAt:new Date().toISOString()};if(existing)Object.assign(existing,data);else db.visited.unshift({id:uid(),...data,createdAt:new Date().toISOString()});persist();}
function saveGraef(h){const k=hitKey(h);const informedAt=h.informedAt||h.visitedAt||today();const data={company:h.company,target:h.target,informedAt,week:isoWeekKey(new Date(informedAt+'T12:00:00')),address:h.address,phone:h.phone,website:h.website,notes:'Über GRAEF informiert. '+(h.notes||''),discussion:h.discussion||'',updatedAt:new Date().toISOString()};const existing=db.graef.find(g=>hitKey(g)===k&&g.week===data.week);if(existing)Object.assign(existing,data);else db.graef.unshift({id:uid(),...data,createdAt:new Date().toISOString()});persist();}
function createDayTour(){const date=plannerSelectedTourDate();const weekStart=mondayOfDateString(date);const week=weekKeyFromStart(weekStart);const limit=Math.min(10,Math.max(1,Number(document.getElementById('tourLimit')?.value||10)));let candidates=tourState.results.filter(h=>!isVisited(h));const existingForDay=new Set(db.tours.filter(t=>t.tourDate===date).map(t=>hitKey(t)));let rows=candidates.filter(h=>!existingForDay.has(hitKey(h))).slice(0,limit);if(!rows.length){alert('Keine neuen Betriebe für '+formatDate(date)+'. Suche starten, bereits besuchte ausblenden deaktivieren oder anderen Tag wählen.');return;}rows.forEach((h,idx)=>{h.discussion=readHitDiscussion(tourState.results.indexOf(h));db.tours.push({id:uid(),tourDate:date,weekStart,weekKey:week,order:idx+1,company:h.company,target:h.target,address:h.address,phone:h.phone,website:h.website,status:'Geplant',graefInfo:isGraef(h)?'Ja':'Nein',visitedAt:'',notes:h.notes,discussion:h.discussion||'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()})});persist();setTourStatus(`${rows.length} Betriebe für ${formatDate(date)} gespeichert · ${week} · Wochenstart ${formatDate(weekStart)}.`);renderNav();setActive('tours');}
function createWorkWeekTour(){
  const weekStart=mondayOfDateString(document.getElementById('tourWeekStart')?.value||currentWeekStart());
  const week=weekKeyFromStart(weekStart);
  const limit=Math.min(10,Math.max(1,Number(document.getElementById('tourLimit')?.value||10)));
  let candidates=tourState.results.filter(h=>!isVisited(h));
  if(!candidates.length){alert('Keine Suchtreffer vorhanden. Bitte zuerst PLZ/Ort wählen und Tourensuche starten.');return;}

  const existingWeek=db.tours.filter(t=>dateInWeekRange(t.tourDate,weekStart));
  const existingWeekKeys=new Set(existingWeek.map(t=>hitKey(t)));
  candidates=candidates.filter(h=>!existingWeekKeys.has(hitKey(h)));
  if(!candidates.length){alert('Für diese Woche sind keine neuen Betriebe mehr aus der aktuellen Suche übrig. Radius erhöhen oder andere Zielgruppe/PLZ wählen.');return;}

  let cursor=0,created=0,counts=[],overflow=0;
  for(let offset=0;offset<=4;offset++){
    const date=addDaysToIso(weekStart,offset);
    const existingDay=db.tours.filter(t=>t.tourDate===date);
    const existingDayKeys=new Set(existingDay.map(t=>hitKey(t)));
    let capacity=Math.max(0,limit-existingDay.length);
    let startOrder=existingDay.length+1;
    let dayCount=0;

    while(capacity>0 && cursor<candidates.length){
      const h=candidates[cursor++];
      if(existingDayKeys.has(hitKey(h)))continue;
      h.discussion=readHitDiscussion(tourState.results.indexOf(h));
      db.tours.push({
        id:uid(),tourDate:date,weekStart,weekKey:week,order:startOrder+dayCount,
        company:h.company,target:h.target,address:h.address,phone:h.phone,website:h.website,
        status:'Geplant',graefInfo:isGraef(h)?'Ja':'Nein',visitedAt:'',notes:h.notes||'',discussion:h.discussion||'',
        createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()
      });
      existingDayKeys.add(hitKey(h));
      dayCount++;created++;capacity--;
    }
    counts.push(`${weekdayName(date)}: ${dayCount}`);
  }
  overflow=Math.max(0,candidates.length-cursor);
  persist();
  const overflowText=overflow>0?` · ${overflow} weitere Treffer bleiben als Reserve für die nächste Woche.`:'';
  setTourStatus(`${created} Betriebe für ${week} gespeichert · automatische Überlaufplanung Mo–Fr · ${counts.join(' · ')}${overflowText} Danach über Wochenexport als Excel herunterladen.`);
  renderNav();
  setActive('tours');
}
function markTourVisited(id){const t=db.tours.find(x=>x.id===id);if(!t)return;const talk=prompt('Was wurde besprochen?',t.discussion||'');if(talk!==null)t.discussion=talk;t.status='Besucht';t.visitedAt=t.visitedAt||today();saveVisited(t);persist();renderContent();}
function markTourGraef(id){const t=db.tours.find(x=>x.id===id);if(!t)return;const talk=prompt('Was wurde zu GRAEF besprochen?',t.discussion||'');if(talk!==null)t.discussion=talk;t.graefInfo='Ja';saveGraef(t);persist();renderContent();}
function openHitMaps(i){const h=tourState.results[i];if(h?.lat&&h?.lon)window.open(`https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lon}`,'_blank');else openMapsFor(h.address||h.company);}
function openMapsFor(q){window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q),'_blank');}
function openGoogleSearch(){const cat=document.getElementById('tourCat').value;const cfg=categoryMap[cat];const place=document.getElementById('placeQuery').value||'';window.open('https://www.google.com/maps/search/'+encodeURIComponent(cfg.query+' '+place),'_blank');}
// Calendar
function calendarHTML(){const events=[...db.calendar.map(e=>({title:e.title,date:e.date,type:e.type})),...db.tasks.filter(t=>t.due).map(t=>({title:t.title,date:t.due,type:'Aufgabe'})),...db.offers.filter(o=>o.followDate).map(o=>({title:'Angebot nachfassen: '+o.title,date:o.followDate,type:'Angebot'}))];const d=new Date();const y=d.getFullYear(),m=d.getMonth();const first=new Date(y,m,1),last=new Date(y,m+1,0);let days=[];for(let i=1;i<=last.getDate();i++){const iso=new Date(y,m,i).toISOString().slice(0,10);const ev=events.filter(e=>e.date===iso);days.push(`<div class="day"><b>${i}</b>${ev.map(e=>`<div class="event">${esc(e.title)}</div>`).join('')}</div>`)}return `<div class="panel"><div class="panel-head"><h3>${d.toLocaleString('de-DE',{month:'long',year:'numeric'})}</h3><button class="btn primary" onclick="openModal('calendar')">+ Termin</button></div><div class="panel-body"><div class="calendar-grid">${days.join('')}</div></div></div>`}
function addCalendarFromRecord(m,id){const r=(db[m]||[]).find(x=>x.id===id);if(!r)return;const date=r.followDate||r.due||r.nextDate||today();db.calendar.unshift({id:uid(),title:(m==='offers'?'Angebot nachfassen: ':'Termin: ')+(r.title||r.company||''),date,time:'09:00',customer:r.customer||r.company||'',type:m==='offers'?'Angebot':'Intern',notes:r.notes||'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});persist();setActive('calendar');}
// Products
function productsHTML(){return `<div class="panel"><div class="panel-head"><div><h3>Produktkatalog</h3><div class="muted">Kartenansicht für schnelle Angebots-/Tourenargumentation.</div></div><div class="toolbar"><input class="input" id="prodQ" placeholder="Produkt suchen …" oninput="renderProducts()"><button class="btn primary" onclick="openModal('products')">+ Produkt</button></div></div><div class="panel-body"><div class="cards" id="prodCards"></div></div></div>`}
function renderProducts(){const q=norm(document.getElementById('prodQ')?.value||'');const rows=db.products.filter(p=>!q||norm(JSON.stringify(p)).includes(q));document.getElementById('prodCards').innerHTML=rows.map(p=>`<div class="card"><div class="card-img">${p.image?`<img src="${esc(p.image)}" alt="">`:'Maschinenbild'}</div><div class="card-body"><span class="pill">${esc(p.manufacturer)}</span><h3>${esc(p.product)}</h3><p>${esc(p.notes||'')}</p><div class="row-actions">${p.page?`<button class="btn" onclick="openUrl('${esc(p.page)}')">Website</button>`:''}<button class="btn primary" onclick="openModal('offers')">Angebot</button></div></div></div>`).join('')||'<div class="empty">Keine Produkte.</div>';}
const oldRenderContent=renderContent;renderContent=function(){const c=document.getElementById('content'); if(active==='dashboard')c.innerHTML=dashboardHTML(); else if(active==='tourplanner')c.innerHTML=tourHTML(); else if(active==='calendar')c.innerHTML=calendarHTML(); else if(active==='products'){c.innerHTML=productsHTML();setTimeout(renderProducts,0);} else c.innerHTML=listHTML(active); afterRender();}
// Export / backup
function exportCSV(m){const rows=db[m]||[];if(!rows.length){alert('Keine Daten.');return;}const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];const csv=[keys.join(';'),...rows.map(r=>keys.map(k=>'"'+String(r[k]??'').replaceAll('"','""')+'"').join(';'))].join('\n');download(csv,`bloc73_${m}_${today()}.csv`,'text/csv;charset=utf-8');}
function exportBackup(){download(JSON.stringify(db,null,2),`bloc73_crm_backup_${today()}.json`,'application/json');}
function importBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);if(!confirm('Aktuelle Daten durch Backup ersetzen?'))return;db=data;Object.keys(freshDB()).forEach(k=>{if(!Array.isArray(db[k]))db[k]=[]});persist();renderNav();renderContent();}catch(err){alert('Backup konnte nicht geladen werden.')}};r.readAsText(f);}
function download(content,name,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}
function isoWeekKey(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));const week=Math.ceil((((d-yearStart)/86400000)+1)/7);return d.getUTCFullYear()+'-W'+String(week).padStart(2,'0');}


function isoDateLocal(d){const z=new Date(d.getFullYear(),d.getMonth(),d.getDate());return z.getFullYear()+'-'+String(z.getMonth()+1).padStart(2,'0')+'-'+String(z.getDate()).padStart(2,'0');}
function addDaysToIso(iso,days){const d=new Date((iso||today())+'T12:00:00');d.setDate(d.getDate()+Number(days||0));return isoDateLocal(d);}
function mondayOfDateString(iso){const d=new Date((iso||today())+'T12:00:00');const day=d.getDay()||7;d.setDate(d.getDate()+1-day);return isoDateLocal(d);}
function currentWeekStart(){return mondayOfDateString(today());}
function weekKeyFromStart(startIso){return isoWeekKey(new Date((startIso||currentWeekStart())+'T12:00:00'));}
function plannerSelectedTourDate(){const start=document.getElementById('tourWeekStart')?.value||currentWeekStart();const day=Number(document.getElementById('tourDayOffset')?.value||0);return addDaysToIso(mondayOfDateString(start),day);}
function updatePlannerTourDate(){const weekStart=mondayOfDateString(document.getElementById('tourWeekStart')?.value||currentWeekStart());const tourDate=plannerSelectedTourDate();const week=weekKeyFromStart(weekStart);const d=document.getElementById('tourDate');if(d)d.value=tourDate;const label=document.getElementById('tourKwLabel');if(label)label.textContent=`${week} · ${formatDate(weekStart)} bis ${formatDate(addDaysToIso(weekStart,6))}`;}
function setPlannerMondayFromDate(){const el=document.getElementById('tourWeekStart');if(el)el.value=mondayOfDateString(el.value||currentWeekStart());updatePlannerTourDate();}
function setPlannerMondayToday(){const el=document.getElementById('tourWeekStart');if(el)el.value=currentWeekStart();const day=document.getElementById('tourDayOffset');if(day)day.value='0';updatePlannerTourDate();}
function shiftPlannerWeek(dir){const el=document.getElementById('tourWeekStart');if(!el)return;el.value=addDaysToIso(mondayOfDateString(el.value||currentWeekStart()),Number(dir||0)*7);updatePlannerTourDate();}
function setExportMondayFromDate(inputId,labelId){const el=document.getElementById(inputId);if(!el)return;el.value=mondayOfDateString(el.value||currentWeekStart());const start=el.value;const label=document.getElementById(labelId);if(label)label.textContent=`${weekKeyFromStart(start)} · ${formatDate(start)} bis ${formatDate(addDaysToIso(start,6))}`;}
function dateInWeekRange(dateIso,startIso){if(!dateIso)return false;const start=mondayOfDateString(startIso||currentWeekStart());const end=addDaysToIso(start,6);return dateIso>=start && dateIso<=end;}

function weekOfDateString(d){return d?isoWeekKey(new Date(d+'T12:00:00')):'';}
function weekdayName(iso){return ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][new Date((iso||today())+'T12:00:00').getDay()];}
function rowsForTourWeekStart(startIso){const start=mondayOfDateString(startIso||currentWeekStart());return db.tours.filter(t=>dateInWeekRange(t.tourDate,start)).sort((a,b)=>(a.tourDate||'').localeCompare(b.tourDate||'')+(Number(a.order||0)-Number(b.order||0))/1000);}
function graefRowsForWeekStart(startIso){const start=mondayOfDateString(startIso||currentWeekStart());return db.graef.filter(g=>dateInWeekRange(g.informedAt,start)).sort((a,b)=>(a.informedAt||'').localeCompare(b.informedAt||''));}
function exportExcelFile(filename,title,headers,rows){const tableRows=rows.map(row=>'<tr>'+row.map(cell=>'<td>'+esc(cell)+'</td>').join('')+'</tr>').join('');const html=`<!doctype html><html><head><meta charset="utf-8"><style>table{border-collapse:collapse}th,td{border:1px solid #999;padding:8px;vertical-align:top}th{background:#eee;font-weight:bold}.title{font-size:18pt;font-weight:bold}</style></head><body><div class="title">${esc(title)}</div><table><thead><tr>${headers.map(h=>'<th>'+esc(h)+'</th>').join('')}</tr></thead><tbody>${tableRows}</tbody></table></body></html>`;download(html,filename,'application/vnd.ms-excel;charset=utf-8');}

function pdfHex(str){let out='FEFF';for(const ch of String(str??'')){let cp=ch.codePointAt(0);if(cp>0xFFFF)cp=0x003F;out+=cp.toString(16).padStart(4,'0').toUpperCase();}return '<'+out+'>';}
function wrapText(str,max=88){const words=String(str??'').replace(/\s+/g,' ').trim().split(' ');const lines=[];let line='';for(const w of words){if((line+' '+w).trim().length>max){if(line)lines.push(line);line=w;}else line=(line+' '+w).trim();}if(line)lines.push(line);return lines.length?lines:[''];}
function downloadPdfReport(title,subtitle,records,filename){const pageW=595,pageH=842,margin=38,lineH=13;let pages=[],ops=[],y=pageH-margin;function addLine(text,size=9,bold=false){if(y<margin+30){pages.push(ops.join('\n'));ops=[];y=pageH-margin;}ops.push(`BT /F1 ${size} Tf ${margin} ${y} Td ${pdfHex(text)} Tj ET`);y-=lineH;}addLine(title,17,true);addLine(subtitle,9);addLine('',6);records.forEach((r,idx)=>{addLine(`${idx+1}. ${r.Firma||''} · ${r.Zielgruppe||''} · ${r.Datum||''}`,11,true);['Status','Adresse','Telefon','Website','GRAEF','Besprochen','Notiz'].forEach(k=>{if(r[k])wrapText(`${k}: ${r[k]}`,96).forEach(line=>addLine(line,8));});addLine('',5);});if(ops.length)pages.push(ops.join('\n'));let objects=[];function obj(s){objects.push(s);return objects.length;}const fontId=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');const pageIds=[];const contentIds=[];for(const content of pages){contentIds.push(obj(`<< /Length ${content.length} >>\nstream\n${content}\nendstream`));}
let pagesId;for(let i=0;i<contentIds.length;i++){pageIds.push(obj(`<< /Type /Page /Parent ${contentIds.length+3} 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /Font << /F1 ${fontId} 0 R >> >> /Contents ${contentIds[i]} 0 R >>`));}
pagesId=obj(`<< /Type /Pages /Kids [${pageIds.map(id=>id+' 0 R').join(' ')}] /Count ${pageIds.length} >>`);const catalogId=obj(`<< /Type /Catalog /Pages ${pagesId} 0 R >>`);let pdf='%PDF-1.4\n';const offsets=[0];objects.forEach((o,i)=>{offsets.push(pdf.length);pdf+=`${i+1} 0 obj\n${o}\nendobj\n`;});const xref=pdf.length;pdf+=`xref\n0 ${objects.length+1}\n0000000000 65535 f \n`+offsets.slice(1).map(n=>String(n).padStart(10,'0')+' 00000 n ').join('\n')+`\ntrailer << /Size ${objects.length+1} /Root ${catalogId} 0 R >>\nstartxref\n${xref}\n%%EOF`;download(pdf,filename,'application/pdf');}

function pill(v){if(!v)return '';let cls='';if(['Ja','Besucht','Gewonnen','Erledigt','Lead erstellt','Wiedervorlage'].includes(v))cls='ok';if(['Nein','Offen','Geplant','Nachfassen','Nicht erreicht'].includes(v))cls='warn';if(['Verloren','Nicht relevant','Kein Interesse','Nicht vorhanden'].includes(v))cls='danger';return `<span class="pill ${cls}">${esc(v)}</span>`;}

function isProcessed(h){
  const k=hitKey(h);
  return db.visited.some(v=>hitKey(v)===k) || db.tours.some(t=>hitKey(t)===k && ['Besucht','Wiedervorlage','Lead erstellt','Kein Interesse','Nicht vorhanden','Nicht relevant'].includes(t.status||''));
}
function isVisited(h){return isProcessed(h);}
function duplicateDetails(h){
  const k=hitKey(h); const out=[];
  (db.visited||[]).filter(v=>hitKey(v)===k).forEach(v=>out.push(`Besuchte Kunden: ${v.status||'Besucht'}${v.visitedAt?' am '+formatDate(v.visitedAt):''}${v.nextDate?' · WV '+formatDate(v.nextDate):''}`));
  (db.tours||[]).filter(t=>hitKey(t)===k).forEach(t=>out.push(`Tour: ${formatDate(t.tourDate)} · ${t.status||'Geplant'}`));
  (db.customers||[]).filter(c=>hitKey(c)===k).forEach(c=>out.push(`Kundenstamm: ${c.status||''}`));
  (db.leads||[]).filter(l=>hitKey(l)===k).forEach(l=>out.push(`Lead: ${l.status||''}${l.nextDate?' · WV '+formatDate(l.nextDate):''}`));
  return out;
}
function confirmDuplicateRows(rows){
  const dups=rows.filter(h=>duplicateDetails(h).length);
  if(!dups.length) return {rows,includeDuplicates:false,hadDuplicates:false};
  const preview=dups.slice(0,12).map(h=>`• ${h.company} – ${duplicateDetails(h)[0]}`).join('\n');
  const ok=confirm(`${dups.length} möglicher Doppelbesuch gefunden.\n\n${preview}${dups.length>12?'\n…':''}\n\nOK = trotzdem einplanen / speichern.\nAbbrechen = Doppelbesuche auslassen.`);
  return {rows: ok?rows:rows.filter(h=>!duplicateDetails(h).length), includeDuplicates:ok, hadDuplicates:true};
}

async function runTourSearch(){
  const cat=document.getElementById('tourCat').value;const radius=Number(document.getElementById('tourRadius').value);
  if(!tourState.lat||!tourState.lon){await findPlaces(); if(!tourState.lat||!tourState.lon)return;}
  tourState.loading=true;tourState.results=[];renderTourResults();setTourStatus('Internet-Suche läuft …');
  try{
    const hits=await fetchOverpass(cat,radius,tourState.lat,tourState.lon);
    tourState.results=hits;
    tourState.loading=false;
    const processed=hits.filter(h=>isProcessed(h)).length;
    const dupes=hits.filter(h=>duplicateDetails(h).length).length;
    setTourStatus(`${hits.length} passende Betriebe gefunden. ${processed} bereits bearbeitet/besucht und bei aktivem Haken ausgeblendet. ${dupes} mögliche Doppelbesuche werden beim Speichern abgefragt.`);
    renderTourResults();
  }catch(e){tourState.loading=false;setTourStatus('Suche fehlgeschlagen: '+e.message+'. Nutze Google Maps Backup oder reduziere/ändere Radius.');renderTourResults();}
}

function renderTourResults(){
  const box=document.getElementById('tourResults');if(!box)return;
  const q=norm(document.getElementById('hitFilter')?.value||''); const hide=document.getElementById('hideVisited')?.checked;
  let rows=tourState.results.filter(h=>(!q||norm(JSON.stringify(h)).includes(q)) && (!hide || !isProcessed(h)));
  const cnt=document.getElementById('tourHitCount');if(cnt)cnt.textContent=rows.length;
  if(tourState.loading){box.innerHTML='<div class="empty">Suche läuft …</div>';return;}
  const hidden=tourState.results.length-rows.length;
  box.innerHTML=(hidden>0?`<div class="notice">${hidden} Treffer sind ausgeblendet, weil sie bereits bearbeitet/geplant/besucht wurden. Haken entfernen, wenn du Doppelbesuche bewusst prüfen willst.</div>`:'')+(rows.length?rows.map(h=>hitCard(h,tourState.results.indexOf(h))).join(''):'<div class="empty">Keine offenen Treffer. PLZ/Ort eingeben, prüfen und Tourensuche starten.</div>');
}

function hitCard(h,i){
  const processed=isProcessed(h), graef=isGraef(h), dup=duplicateDetails(h);

}

function saveVisited(h,status='Besucht',extra={}){
  const k=hitKey(h);const existing=db.visited.find(v=>hitKey(v)===k);
  const data={company:h.company,target:h.target,status,visitedAt:extra.visitedAt||h.visitedAt||today(),nextDate:extra.nextDate||h.nextDate||'',address:h.address,phone:h.phone,website:h.website,notes:h.notes||'',discussion:h.discussion||'',updatedAt:new Date().toISOString()};
  if(existing)Object.assign(existing,data);else db.visited.unshift({id:uid(),...data,createdAt:new Date().toISOString()});
  persist();
}
function saveGraef(h){
  const k=hitKey(h);const informedAt=h.informedAt||h.visitedAt||today();
  const data={company:h.company,target:h.target,informedAt,week:isoWeekKey(new Date(informedAt+'T12:00:00')),address:h.address,phone:h.phone,website:h.website,notes:'Über GRAEF informiert. '+(h.notes||''),discussion:h.discussion||'',updatedAt:new Date().toISOString()};
  const existing=db.graef.find(g=>hitKey(g)===k&&g.week===data.week);if(existing)Object.assign(existing,data);else db.graef.unshift({id:uid(),...data,createdAt:new Date().toISOString()});
  saveVisited({...h,visitedAt:informedAt,discussion:h.discussion||'',notes:h.notes||''},'GRAEF informiert',{visitedAt:informedAt});
  persist();
}

function requireDuplicateConfirm(h,action){const dup=duplicateDetails(h);if(!dup.length)return true;return confirm(`Möglicher Doppelbesuch bei ${h.company}.\n\n${dup.join('\n')}\n\nTrotzdem ${action}?`);}
function addHitAsLead(i){const h=prepareHit(i);if(!h)return;if(!requireDuplicateConfirm(h,'als Lead speichern'))return;db.leads.unshift({id:uid(),company:h.company,target:h.target,status:'Neu',source:'Tourensuche',address:h.address,phone:h.phone,email:'',website:h.website,nextDate:'',notes:h.notes||'',discussion:h.discussion||'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});saveVisited(h,'Lead erstellt');removeHitFromResults(h);persist();renderNav();renderTourResults();alert('Lead erstellt und im Besuchsabgleich gespeichert.');}

function createDayTour(){
  const date=plannerSelectedTourDate();const weekStart=mondayOfDateString(date);const week=weekKeyFromStart(weekStart);const limit=Math.min(10,Math.max(1,Number(document.getElementById('tourLimit')?.value||10)));
  let candidates=tourState.results.slice();
  if(!candidates.length){alert('Keine Suchtreffer vorhanden. Bitte zuerst PLZ/Ort wählen und Tourensuche starten.');return;}
  const check=confirmDuplicateRows(candidates); candidates=check.rows;
  if(!check.includeDuplicates)candidates=candidates.filter(h=>!isProcessed(h));
  const existingForDay=new Set(db.tours.filter(t=>t.tourDate===date).map(t=>hitKey(t)));
  let rows=candidates.filter(h=>check.includeDuplicates || !existingForDay.has(hitKey(h))).slice(0,limit);
  if(!rows.length){alert('Keine neuen Betriebe für '+formatDate(date)+'. Bei Doppelbesuchen OK bestätigen oder anderen Ort/Radius wählen.');return;}
  rows.forEach((h,idx)=>{h.discussion=readHitDiscussion(tourState.results.indexOf(h));db.tours.push({id:uid(),tourDate:date,weekStart,weekKey:week,order:idx+1,company:h.company,target:h.target,address:h.address,phone:h.phone,website:h.website,status:'Geplant',graefInfo:isGraef(h)?'Ja':'Nein',visitedAt:'',notes:h.notes||'',discussion:h.discussion||'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()})});
  persist();setTourStatus(`${rows.length} Betriebe für ${formatDate(date)} gespeichert · ${week}. ${check.hadDuplicates?'Doppelbesuch-Abgleich durchgeführt.':''}`);renderNav();setActive('tours');
}
function createWorkWeekTour(){
  const weekStart=mondayOfDateString(document.getElementById('tourWeekStart')?.value||currentWeekStart());
  const week=weekKeyFromStart(weekStart);const limit=Math.min(10,Math.max(1,Number(document.getElementById('tourLimit')?.value||10)));
  let candidates=tourState.results.slice();
  if(!candidates.length){alert('Keine Suchtreffer vorhanden. Bitte zuerst PLZ/Ort wählen und Tourensuche starten.');return;}
  const check=confirmDuplicateRows(candidates); candidates=check.rows;
  if(!check.includeDuplicates)candidates=candidates.filter(h=>!isProcessed(h));
  if(!candidates.length){alert('Alle Treffer sind bereits bearbeitet/geplant/besucht. Für Doppelbesuch OK bestätigen oder neue Suche starten.');return;}
  let cursor=0,created=0,counts=[],overflow=0;
  for(let offset=0;offset<=4;offset++){
    const date=addDaysToIso(weekStart,offset);const existingDay=db.tours.filter(t=>t.tourDate===date);const existingDayKeys=new Set(existingDay.map(t=>hitKey(t)));
    let capacity=Math.max(0,limit-existingDay.length);let startOrder=existingDay.length+1;let dayCount=0;
    while(capacity>0 && cursor<candidates.length){
      const h=candidates[cursor++];
      if(!check.includeDuplicates && existingDayKeys.has(hitKey(h)))continue;
      h.discussion=readHitDiscussion(tourState.results.indexOf(h));
      db.tours.push({id:uid(),tourDate:date,weekStart,weekKey:week,order:startOrder+dayCount,company:h.company,target:h.target,address:h.address,phone:h.phone,website:h.website,status:'Geplant',graefInfo:isGraef(h)?'Ja':'Nein',visitedAt:'',notes:h.notes||'',discussion:h.discussion||'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
      existingDayKeys.add(hitKey(h));dayCount++;created++;capacity--;
    }
    counts.push(`${weekdayName(date)}: ${dayCount}`);
  }
  overflow=Math.max(0,candidates.length-cursor);persist();
  const overflowText=overflow>0?` · ${overflow} weitere Treffer bleiben als Reserve für die nächste Woche.`:'';
  setTourStatus(`${created} Betriebe für ${week} gespeichert · ${counts.join(' · ')}${overflowText} ${check.hadDuplicates?'Doppelbesuch-Abgleich durchgeführt.':''}`);
  renderNav();setActive('tours');
}
